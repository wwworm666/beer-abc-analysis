<!DOCTYPE html>
<html>
<head>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <meta charset="UTF-8">
    <title>Test Modules Loading</title>
</head>
<body>
    <h1>Testing Module Loading</h1>
    <div id="results"></div>

    <script type="module">
        const results = document.getElementById('results');

        function log(message, type = 'info') {
            const p = document.createElement('p');
            p.textContent = `[${type.toUpperCase()}] ${message}`;
            p.style.color = type === 'error' ? 'red' : type === 'success' ? 'green' : 'black';
            results.appendChild(p);
            console.log(message);
        }

        // Test 1: Check if server is running
        try {
            log('Test 1: Checking server connection...', 'info');
            const response = await fetch('http://localhost:5000/api/venues');
            if (response.ok) {
                log(`✅ Server is running at http://localhost:5000`, 'success');
            } else {
                throw new Error('Server returned status ' + response.status);
            }
        } catch (error) {
            log(`⚠️  Server not running or unreachable: ${error.message}`, 'error');
            log('Make sure to start the Flask app with: python app.py', 'info');
        }

        // Test 2: Import config
        try {
            log('Test 2: Importing config.js...', 'info');
            const { API } = await import('http://localhost:5000/static/js/dashboard/core/config.js');
            log(`✅ config.js loaded`, 'success');
        } catch (error) {
            log(`❌ Failed to load config.js: ${error.message}`, 'error');
        }

        // Test 3: Import api
        try {
            log('Test 3: Importing api.js...', 'info');
            const { api } = await import('http://localhost:5000/static/js/dashboard/core/api.js');
            log(`✅ api.js loaded`, 'success');
        } catch (error) {
            log(`❌ Failed to load api.js: ${error.message}`, 'error');
        }

        // Test 4: Import state
        try {
            log('Test 4: Importing state.js...', 'info');
            const { state } = await import('http://localhost:5000/static/js/dashboard/core/state.js');
            log(`✅ state.js loaded`, 'success');
        } catch (error) {
            log(`❌ Failed to load state.js: ${error.message}`, 'error');
        }

        // Test 5: Import venue_selector
        try {
            log('Test 5: Importing venue_selector.js...', 'info');
            const { venueSelector } = await import('http://localhost:5000/static/js/dashboard/modules/venue_selector.js');
            log(`✅ venue_selector.js loaded`, 'success');
        } catch (error) {
            log(`❌ Failed to load venue_selector.js: ${error.message}`, 'error');
        }

        // Test 6: Test API call
        try {
            log('Test 6: Making API call to /api/venues...', 'info');
            const response = await fetch('http://localhost:5000/api/venues');
            const data = await response.json();
            log(`✅ API call successful, received ${data.venues.length} venues`, 'success');
        } catch (error) {
            log(`❌ API call failed: ${error.message}`, 'error');
        }

        log('=== All tests completed ===', 'info');
    </script>
</body>
</html>
