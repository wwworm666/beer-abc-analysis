<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>График смен — Пивная культура</title>
    <!-- Shared CSS -->
    <link rel="stylesheet" href="/static/dashboard/styles/fonts.css">
    <link rel="stylesheet" href="/static/dashboard/styles/variables.css">
    <link rel="stylesheet" href="/static/dashboard/styles/base.css">
    <link rel="stylesheet" href="/static/dashboard/styles/sidebar.css">
    <link rel="stylesheet" href="/static/dashboard/styles/mobile.css">
    <link rel="stylesheet" href="/static/logo.css">
    <link rel="stylesheet" href="/static/schedule/schedule.css?v={{ app_version }}">
</head>
<body class="schedule-page">
    <div class="container">
        {% set page_title = "График" %}
        {% set page_subtitle = "Кто где работает" %}
        {% include 'shared/nav.html' %}
    </div>

    <div class="month-nav">
        <button class="nav-btn" id="prevMonth">&larr; Пред</button>
        <div class="current-month" id="currentMonth"></div>
        <button class="nav-btn" id="nextMonth">След &rarr;</button>
        <span class="nav-spacer"></span>
        <a class="page-switch" href="/schedule/edit">Редактор</a>
    </div>

    <main class="main-content">
        <div class="schedule-container">
            <div class="schedule-grid" id="scheduleGrid"></div>
        </div>

        <div class="loading" id="loading" style="display: none;">
            <div class="spinner"></div>
            Загрузка...
        </div>
    </main>

    <!-- Модалка ввода факта часов: бармен в конце смены вписывает,
         сколько отработал. Это единственный источник факта часов. -->
    <div class="modal-overlay" id="factModal">
        <div class="modal">
            <h2 id="factModalTitle">Отработанные часы</h2>
            <form id="factForm">
                <div class="form-group">
                    <label for="factInput">Сколько отработано</label>
                    <input type="text" id="factInput" inputmode="numeric"
                           placeholder="10:30" autocomplete="off">
                    <div class="form-hint">Формат: 10:30 (часы:минуты) или 10.5</div>
                </div>
                <div class="actions">
                    <button type="button" class="btn btn-danger" id="factClear">Очистить</button>
                    <button type="button" class="btn btn-secondary" id="factCancel">Отмена</button>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="/static/js/schedule/common.js?v={{ app_version }}"></script>
    <script src="/static/js/schedule/view.js?v={{ app_version }}"></script>
    <script src="/static/logo.js"></script>
</body>
</html>
