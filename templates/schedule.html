<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>График смен — Пивная культура</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #FAF9F7;
            --bg-secondary: #FFFFFF;
            --bg-tertiary: #F5F5F0;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border-color: #E5E5E0;
            --accent: #D97757;
            --accent-hover: #C56647;
            --success: #059669;
            --warning: #F59E0B;
            --danger: #DC2626;
            --role-barman: #4CAF50;
            --role-second: #2196F3;
            --role-trainee: #FF9800;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --radius: 12px;
            --radius-sm: 8px;
        }

        [data-theme="dark"] {
            --bg-primary: #1C1917;
            --bg-secondary: #292524;
            --bg-tertiary: #3D3835;
            --text-primary: #FAF9F7;
            --text-secondary: #A8A29E;
            --text-muted: #78716C;
            --border-color: #44403C;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 { font-size: 1.25rem; font-weight: 600; }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        .nav-links { display: flex; gap: 8px; flex-wrap: wrap; }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            transition: all 150ms ease;
        }

        .nav-links a:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .nav-links a.active { background: var(--accent); color: white; }

        /* Month Navigation */
        .month-nav {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--bg-secondary);
            padding: 12px 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .month-nav button {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            color: var(--text-primary);
            font-family: inherit;
            transition: all 150ms ease;
        }

        .month-nav button:hover { background: var(--accent); color: white; border-color: var(--accent); }
        .month-nav .current-month { font-size: 1.1rem; font-weight: 600; min-width: 180px; text-align: center; }

        /* Employee Paint Toolbar */
        .paint-toolbar {
            background: var(--bg-secondary);
            padding: 12px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .paint-toolbar .label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
            white-space: nowrap;
        }

        .paint-toolbar .employee-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            flex: 1;
        }

        .emp-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: 2px solid var(--border-color);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 150ms ease;
            user-select: none;
        }

        .emp-btn:hover { border-color: var(--accent); color: var(--accent); }

        .emp-btn.selected {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .emp-btn.eraser { background: transparent; border-style: dashed; }

        .emp-btn.eraser.selected {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
            border-style: solid;
        }

        .paint-hint { font-size: 0.8rem; color: var(--text-muted); padding: 4px 0; }

        /* Main Content */
        .main-content { padding: 24px; display: flex; flex-direction: column; gap: 24px; }

        /* Schedule Grid */
        .schedule-container {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: 100px repeat(4, 1fr);
            min-width: 800px;
        }

        .schedule-header { display: contents; }

        .schedule-header > div {
            background: var(--bg-tertiary);
            padding: 16px 12px;
            font-weight: 600;
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            position: sticky;
            top: 0;
        }

        .schedule-cell {
            padding: 0;
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            min-height: 44px;
            position: relative;
            transition: background 150ms ease;
        }

        .schedule-cell:last-child { border-right: none; }

        .schedule-cell.date-cell {
            background: var(--bg-tertiary);
            font-weight: 500;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            padding: 6px;
        }

        .schedule-cell.date-cell:hover { background: var(--accent); color: white; }

        .schedule-cell.date-cell .day-name { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 1px; }
        .schedule-cell.date-cell:hover .day-name { color: rgba(255,255,255,0.8); }
        .schedule-cell.date-cell .day-number { font-size: 0.9rem; }

        .schedule-cell.weekend { background: rgba(217, 119, 87, 0.05); }

        .schedule-cell.shift-cell { cursor: pointer; }
        .schedule-cell.shift-cell:hover { background: rgba(217, 119, 87, 0.08); }

        body.paint-mode .schedule-cell.shift-cell { cursor: crosshair; }
        body.paint-mode .schedule-cell.shift-cell:hover { background: rgba(217, 119, 87, 0.15); }
        body.eraser-mode .schedule-cell.shift-cell { cursor: not-allowed; }

        /* Shift badge — fills the cell, centered */
        .shift-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px 6px;
            font-size: 0.8rem;
            color: white;
            cursor: pointer;
            transition: opacity 150ms;
            text-align: center;
            min-height: 40px;
        }

        .shift-badge:hover { opacity: 0.85; }

        .shift-badge.role-barman { background: var(--role-barman); }
        .shift-badge.role-second { background: var(--role-second); }
        .shift-badge.role-trainee { background: var(--role-trainee); }

        /* Multiple shifts stacked */
        .shift-badge + .shift-badge { border-top: 1px solid rgba(255,255,255,0.3); }

        /* Day-off marker */
        .dayoff-marker {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 16px;
            height: 16px;
            background: var(--warning);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            cursor: help;
            z-index: 2;
        }

        /* Revenue Panel */
        .revenue-panel {
            background: var(--bg-tertiary);
            padding: 16px 24px;
            border-top: 2px solid var(--accent);
            display: none;
        }

        .revenue-panel.active { display: block; }

        .revenue-panel h3 {
            margin-bottom: 16px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .revenue-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .revenue-card {
            background: var(--bg-secondary);
            padding: 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
        }

        .revenue-card .location { font-weight: 600; margin-bottom: 12px; }
        .revenue-card .field { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .revenue-card .field label { font-size: 0.8rem; color: var(--text-secondary); width: 50px; }

        .revenue-card .field input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
        }

        .revenue-card .fact-value { font-size: 1.1rem; font-weight: 600; color: var(--success); }
        .revenue-card .fact-value.empty { color: var(--text-muted); }

        /* ==================== Wishes Board ==================== */
        .wishes-board {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            padding: 20px 24px;
        }

        .wishes-board h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-secondary);
        }

        .wishes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
        }

        .wish-card {
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            padding: 14px;
            border: 1px solid var(--border-color);
        }

        .wish-card .emp-name {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .wish-card textarea {
            width: 100%;
            min-height: 50px;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.85rem;
            resize: vertical;
        }

        .wish-card textarea:focus { outline: none; border-color: var(--accent); }

        .wish-card textarea::placeholder { color: var(--text-muted); }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 24px;
            width: 100%;
            max-width: 480px;
            box-shadow: var(--shadow-md);
        }

        .modal h2 { margin-bottom: 20px; font-size: 1.1rem; }
        .modal .form-group { margin-bottom: 16px; }
        .modal .form-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 6px; }

        .modal .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
        }

        .modal .form-group select:focus { outline: none; border-color: var(--accent); }

        .modal .warning-box {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid var(--warning);
            border-radius: var(--radius-sm);
            padding: 12px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            color: var(--warning);
        }

        .modal .actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            border: none;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 150ms ease;
        }

        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border-color); }
        .btn-secondary:hover { background: var(--border-color); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }

        .theme-toggle {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.85rem;
        }

        .loading { display: flex; align-items: center; justify-content: center; padding: 48px; color: var(--text-muted); }

        .spinner {
            width: 24px; height: 24px;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--success);
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            box-shadow: var(--shadow-md);
            z-index: 2000;
            transition: opacity 300ms, transform 300ms;
            opacity: 0;
            transform: translateY(20px);
        }

        .toast.show { opacity: 1; transform: translateY(0); }

        @media (max-width: 900px) {
            .schedule-grid { grid-template-columns: 80px repeat(4, 1fr); }
            .revenue-grid { grid-template-columns: repeat(2, 1fr); }
            .header { flex-direction: column; gap: 12px; }
            .wishes-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
        }

        @media (max-width: 600px) {
            .schedule-container { overflow-x: auto; }
            .revenue-grid { grid-template-columns: 1fr; }
            .month-nav { flex-wrap: wrap; gap: 8px; }
            .wishes-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>График смен</h1>
        <div class="header-actions">
            <nav class="nav-links">
                <a href="/">Дашборд</a>
                <a href="/packaging">ABC/XYZ фасовки</a>
                <a href="/draft">Разливное</a>
                <a href="/waiters">Бармены</a>
                <a href="/employee">Сотрудник</a>
                <a href="/bonus">Бонусы</a>
                <a href="/taps">Краны</a>
                <a href="/stocks">Остатки</a>
                <a href="/schedule" class="active">График</a>
            </nav>
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        </div>
    </header>

    <div class="month-nav">
        <button onclick="prevMonth()">← Пред</button>
        <div class="current-month" id="currentMonth">Февраль 2026</div>
        <button onclick="nextMonth()">След →</button>
    </div>

    <div class="paint-toolbar" id="paintToolbar">
        <span class="label">Кисть:</span>
        <div class="employee-buttons" id="employeeButtons"></div>
        <button class="emp-btn eraser" id="eraserBtn" onclick="selectEraser()">✕ Ластик</button>
        <span class="paint-hint" id="paintHint">Выбери сотрудника, потом кликай по ячейкам</span>
    </div>

    <main class="main-content">
        <div class="schedule-container">
            <div class="schedule-grid" id="scheduleGrid">
                <div class="schedule-header">
                    <div>Дата</div>
                    <div id="loc-header-0"></div>
                    <div id="loc-header-1"></div>
                    <div id="loc-header-2"></div>
                    <div id="loc-header-3"></div>
                </div>
            </div>

            <div class="revenue-panel" id="revenuePanel">
                <h3>
                    <span>Выручка за <span id="revenuePanelDate">01.01.2026</span></span>
                    <button class="btn btn-success" onclick="syncRevenueFromIiko()">🔄 Sync iiko</button>
                </h3>
                <div class="revenue-grid" id="revenueGrid"></div>
            </div>
        </div>

        <!-- Wishes Board -->
        <div class="wishes-board">
            <h2>Пожелания</h2>
            <div class="wishes-grid" id="wishesGrid"></div>
        </div>

        <div class="loading" id="loading" style="display: none;">
            <div class="spinner"></div>
            Загрузка...
        </div>
    </main>

    <!-- Edit Shift Modal (role change only) -->
    <div class="modal-overlay" id="shiftModal">
        <div class="modal">
            <h2 id="shiftModalTitle">Редактировать смену</h2>
            <div class="warning-box" id="dayoffWarning" style="display: none;">
                ⚠️ Сотрудник просил выходной на эту дату
            </div>
            <form id="shiftForm">
                <input type="hidden" id="shiftId">
                <div class="form-group">
                    <label>Роль</label>
                    <select id="shiftRole" required></select>
                </div>
                <div class="actions">
                    <button type="button" class="btn btn-danger" onclick="deleteShift()">Удалить</button>
                    <button type="button" class="btn btn-secondary" onclick="closeShiftModal()">Отмена</button>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ==================== STATE ====================
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth() + 1;
        let employees = [];
        let roles = [];
        let locations = [];
        let shifts = [];
        let dayOffRequests = [];
        let selectedDate = null;

        let selectedEmployeeName = null;
        let eraserMode = false;
        let defaultRoleId = null;

        const MONTH_NAMES = [
            'Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь',
            'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'
        ];

        const DAY_NAMES = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];

        // ==================== INIT ====================
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            setupForms();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                deselectAll();
                closeShiftModal();
            }
        });

        // ==================== DATA LOADING ====================
        async function loadData() {
            showLoading(true);
            try {
                const [empRes, rolesRes, locRes] = await Promise.all([
                    fetch('/api/schedule/employees'),
                    fetch('/api/schedule/roles'),
                    fetch('/api/schedule/locations')
                ]);

                employees = await empRes.json();
                roles = await rolesRes.json();
                locations = await locRes.json();

                const barmanRole = roles.find(r => r.name === 'бармен');
                defaultRoleId = barmanRole ? barmanRole.id : (roles[0] ? roles[0].id : 1);

                await loadWishes();
                renderEmployeeToolbar();
                populateSelects();
                renderLocationHeaders();
                renderWishesBoard();

                await loadMonth();
            } catch (err) {
                console.error('Error loading data:', err);
                showToast('Ошибка загрузки данных');
            }
            showLoading(false);
        }

        async function loadMonth() {
            showLoading(true);
            try {
                const shiftsRes = await fetch(`/api/schedule/${currentYear}/${currentMonth}`);
                shifts = await shiftsRes.json();

                const firstDay = `${currentYear}-${String(currentMonth).padStart(2, '0')}-01`;
                const lastDay = new Date(currentYear, currentMonth, 0).toISOString().split('T')[0];
                const dayOffRes = await fetch(`/api/schedule/dayoff?date_from=${firstDay}&date_to=${lastDay}`);
                dayOffRequests = await dayOffRes.json();

                updateMonthDisplay();
                renderGrid();
            } catch (err) {
                console.error('Error loading month:', err);
            }
            showLoading(false);
        }

        // ==================== EMPLOYEE TOOLBAR ====================
        function renderEmployeeToolbar() {
            const container = document.getElementById('employeeButtons');
            container.innerHTML = employees.map(emp => {
                const shortName = emp.name.split(' ').slice(0, 2).join(' ');
                return `<button class="emp-btn" data-emp-name="${emp.name}" onclick="selectEmployee('${emp.name.replace(/'/g, "\\'")}')">${shortName}</button>`;
            }).join('');

            if (employees.length === 0) {
                container.innerHTML = '<span class="paint-hint">Загрузка сотрудников из iiko...</span>';
            }
        }

        function selectEmployee(empName) {
            if (selectedEmployeeName === empName) { deselectAll(); return; }

            selectedEmployeeName = empName;
            eraserMode = false;

            document.querySelectorAll('.emp-btn').forEach(btn => btn.classList.remove('selected'));
            const btn = document.querySelector(`.emp-btn[data-emp-name="${empName}"]`);
            if (btn) btn.classList.add('selected');
            document.getElementById('eraserBtn').classList.remove('selected');

            document.body.classList.add('paint-mode');
            document.body.classList.remove('eraser-mode');

            const shortName = empName.split(' ').slice(0, 2).join(' ');
            document.getElementById('paintHint').textContent = `${shortName}: кликай по ячейкам`;
        }

        function selectEraser() {
            if (eraserMode) { deselectAll(); return; }
            eraserMode = true;
            selectedEmployeeName = null;
            document.querySelectorAll('.emp-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('eraserBtn').classList.add('selected');
            document.body.classList.remove('paint-mode');
            document.body.classList.add('eraser-mode');
            document.getElementById('paintHint').textContent = 'Ластик: кликай по бейджам';
        }

        function deselectAll() {
            selectedEmployeeName = null;
            eraserMode = false;
            document.querySelectorAll('.emp-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('eraserBtn').classList.remove('selected');
            document.body.classList.remove('paint-mode', 'eraser-mode');
            document.getElementById('paintHint').textContent = 'Выбери сотрудника, потом кликай по ячейкам';
        }

        // ==================== GRID ====================
        function renderLocationHeaders() {
            locations.forEach((loc, i) => {
                const el = document.getElementById(`loc-header-${i}`);
                if (el) el.textContent = loc.short_name || loc.name;
            });
        }

        function updateMonthDisplay() {
            document.getElementById('currentMonth').textContent =
                `${MONTH_NAMES[currentMonth - 1]} ${currentYear}`;
        }

        function renderGrid() {
            const grid = document.getElementById('scheduleGrid');
            const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();

            const header = grid.querySelector('.schedule-header');
            grid.innerHTML = '';
            grid.appendChild(header);

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${currentYear}-${String(currentMonth).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const date = new Date(currentYear, currentMonth - 1, day);
                const dayOfWeek = date.getDay();
                const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;

                const dateCell = document.createElement('div');
                dateCell.className = `schedule-cell date-cell ${isWeekend ? 'weekend' : ''}`;
                dateCell.innerHTML = `
                    <span class="day-name">${DAY_NAMES[dayOfWeek]}</span>
                    <span class="day-number">${String(day).padStart(2, '0')}.${String(currentMonth).padStart(2, '0')}</span>
                `;
                dateCell.onclick = () => toggleRevenuePanel(dateStr);
                grid.appendChild(dateCell);

                const dayOffEmployees = getDayOffEmployees(dateStr);

                locations.forEach(location => {
                    const cell = document.createElement('div');
                    cell.className = `schedule-cell shift-cell ${isWeekend ? 'weekend' : ''}`;

                    const cellShifts = shifts.filter(s =>
                        s.date === dateStr && s.location_id === location.id
                    );

                    cellShifts.forEach(shift => {
                        const roleClass = getRoleClass(shift.role_name);
                        const badge = document.createElement('div');
                        badge.className = `shift-badge ${roleClass}`;
                        badge.textContent = shift.employee_name.split(' ').slice(0, 2).join(' ');
                        badge.onclick = (e) => { e.stopPropagation(); onBadgeClick(shift.id); };
                        cell.appendChild(badge);

                        if (dayOffEmployees.includes(shift.employee_name)) {
                            const marker = document.createElement('span');
                            marker.className = 'dayoff-marker';
                            marker.title = `${shift.employee_name} просил выходной`;
                            marker.textContent = '⚠';
                            cell.appendChild(marker);
                        }
                    });

                    cell.onclick = () => onCellClick(dateStr, location.id, cellShifts);
                    grid.appendChild(cell);
                });
            }
        }

        function getRoleClass(roleName) {
            if (roleName === 'бармен') return 'role-barman';
            if (roleName === 'второй бармен') return 'role-second';
            if (roleName === 'стажёр') return 'role-trainee';
            return '';
        }

        function getDayOffEmployees(dateStr) {
            return dayOffRequests
                .filter(r => dateStr >= r.date_from && dateStr <= r.date_to)
                .map(r => r.employee_name);
        }

        // ==================== PAINT MODE ACTIONS ====================
        async function onCellClick(dateStr, locationId, cellShifts) {
            if (!selectedEmployeeName) return;

            const existing = cellShifts.find(s => s.employee_name === selectedEmployeeName);
            if (existing) {
                await fetch(`/api/schedule/shift/${existing.id}`, { method: 'DELETE' });
                showToast('Удалено');
            } else {
                const dayOffEmps = getDayOffEmployees(dateStr);
                if (dayOffEmps.includes(selectedEmployeeName)) {
                    if (!confirm(`${selectedEmployeeName} просил выходной на ${formatDate(dateStr)}. Всё равно назначить?`)) return;
                }

                await fetch('/api/schedule/shift', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        date: dateStr,
                        employee_name: selectedEmployeeName,
                        location_id: locationId,
                        role_id: defaultRoleId
                    })
                });
                showToast('Назначено');
            }
            await loadMonth();
        }

        async function onBadgeClick(shiftId) {
            if (eraserMode) {
                await fetch(`/api/schedule/shift/${shiftId}`, { method: 'DELETE' });
                showToast('Удалено');
                await loadMonth();
                return;
            }
            if (selectedEmployeeName) return;
            editShift(shiftId);
        }

        // ==================== MONTH NAV ====================
        function prevMonth() {
            currentMonth--;
            if (currentMonth < 1) { currentMonth = 12; currentYear--; }
            loadMonth();
        }

        function nextMonth() {
            currentMonth++;
            if (currentMonth > 12) { currentMonth = 1; currentYear++; }
            loadMonth();
        }

        // ==================== REVENUE ====================
        function toggleRevenuePanel(dateStr) {
            if (selectedEmployeeName || eraserMode) return;

            const panel = document.getElementById('revenuePanel');
            if (selectedDate === dateStr && panel.classList.contains('active')) {
                panel.classList.remove('active');
                selectedDate = null;
            } else {
                selectedDate = dateStr;
                loadRevenueForDate(dateStr);
                panel.classList.add('active');
            }
        }

        async function loadRevenueForDate(dateStr) {
            document.getElementById('revenuePanelDate').textContent = formatDate(dateStr);
            try {
                const res = await fetch(`/api/schedule/revenue/${dateStr}`);
                const data = await res.json();
                document.getElementById('revenueGrid').innerHTML = data.map(r => `
                    <div class="revenue-card">
                        <div class="location">${r.location_name}</div>
                        <div class="field">
                            <label>План</label>
                            <input type="number" value="${r.plan_revenue || ''}"
                                   onchange="updateRevenue('${dateStr}', ${r.location_id}, this.value)">
                        </div>
                        <div class="field">
                            <label>Факт</label>
                            <span class="fact-value ${r.fact_revenue ? '' : 'empty'}">
                                ${r.fact_revenue ? formatNumber(r.fact_revenue) + ' ₽' : '—'}
                            </span>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Error loading revenue:', err);
            }
        }

        async function updateRevenue(dateStr, locationId, plan) {
            await fetch(`/api/schedule/revenue/${dateStr}/${locationId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ plan_revenue: parseFloat(plan) || 0 })
            });
        }

        async function syncRevenueFromIiko() {
            if (!selectedDate) return;
            try {
                const res = await fetch(`/api/schedule/revenue/sync/${selectedDate}`, { method: 'POST' });
                const result = await res.json();
                showToast(`Синхронизировано: ${result.updated} точек`);
                loadRevenueForDate(selectedDate);
            } catch (err) {
                showToast('Ошибка синхронизации');
            }
        }

        // ==================== WISHES BOARD ====================
        let wishes = {};
        let wishTimers = {};

        async function loadWishes() {
            try {
                const res = await fetch('/api/schedule/wishes');
                const data = await res.json();
                wishes = {};
                data.forEach(w => { wishes[w.employee_name] = w.text; });
            } catch (err) {
                console.error('Error loading wishes:', err);
            }
        }

        function renderWishesBoard() {
            const grid = document.getElementById('wishesGrid');
            grid.innerHTML = employees.map(emp => {
                const shortName = emp.name.split(' ').slice(0, 2).join(' ');
                const savedWish = wishes[emp.name] || '';
                return `
                    <div class="wish-card">
                        <div class="emp-name">${shortName}</div>
                        <textarea
                            placeholder="2,3 выходной&#10;без понедельников"
                            oninput="saveWish('${emp.name.replace(/'/g, "\\'")}', this.value)"
                        >${savedWish}</textarea>
                    </div>
                `;
            }).join('');
        }

        function saveWish(empName, text) {
            // Debounce: сохраняем через 500мс после последнего ввода
            clearTimeout(wishTimers[empName]);
            wishTimers[empName] = setTimeout(async () => {
                await fetch('/api/schedule/wishes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ employee_name: empName, text })
                });
            }, 500);
        }

        // ==================== EDIT SHIFT MODAL ====================
        function editShift(shiftId) {
            const shift = shifts.find(s => s.id === shiftId);
            if (!shift) return;

            document.getElementById('shiftId').value = shiftId;
            document.getElementById('shiftRole').value = shift.role_id;
            document.getElementById('shiftModalTitle').textContent =
                `${shift.employee_name} — ${formatDate(shift.date)}`;

            const dayOffEmps = getDayOffEmployees(shift.date);
            document.getElementById('dayoffWarning').style.display =
                dayOffEmps.includes(shift.employee_name) ? 'block' : 'none';

            document.getElementById('shiftModal').classList.add('active');
        }

        function closeShiftModal() {
            document.getElementById('shiftModal').classList.remove('active');
        }

        async function deleteShift() {
            const shiftId = document.getElementById('shiftId').value;
            if (!shiftId) return;
            await fetch(`/api/schedule/shift/${shiftId}`, { method: 'DELETE' });
            closeShiftModal();
            showToast('Удалено');
            await loadMonth();
        }

        // ==================== FORMS ====================
        function setupForms() {
            document.getElementById('shiftForm').onsubmit = async (e) => {
                e.preventDefault();
                const shiftId = document.getElementById('shiftId').value;
                const roleId = parseInt(document.getElementById('shiftRole').value);

                await fetch(`/api/schedule/shift/${shiftId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role_id: roleId })
                });

                closeShiftModal();
                showToast('Роль обновлена');
                await loadMonth();
            };
        }

        // ==================== HELPERS ====================
        function populateSelects() {
            const roleOptions = roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
            document.getElementById('shiftRole').innerHTML = roleOptions;
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
        }

        function formatDate(dateStr) {
            const [y, m, d] = dateStr.split('-');
            return `${d}.${m}.${y}`;
        }

        function formatNumber(num) {
            return new Intl.NumberFormat('ru-RU').format(Math.round(num));
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ==================== THEME ====================
        function toggleTheme() {
            const body = document.body;
            const btn = document.querySelector('.theme-toggle');
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                btn.textContent = '🌙';
                localStorage.setItem('theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
                btn.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
            }
        }

        if (localStorage.getItem('theme') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            document.querySelector('.theme-toggle').textContent = '☀️';
        }
    </script>
</body>
</html>
