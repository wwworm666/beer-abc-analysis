<!-- Вкладка "Сравнение периодов" — Modern Fintech Design -->

<div class="comparison-container">
    <!-- Режим сравнения -->
    <div class="comparison-mode-tabs">
        <button class="comparison-mode-tab active" data-mode="week">
            Неделя к неделе
        </button>
        <button class="comparison-mode-tab" data-mode="month">
            Месяц к месяцу
        </button>
        <button class="comparison-mode-tab" data-mode="year">
            Год к году
        </button>
    </div>

    <!-- Периоды — единый блок управления как у дашборда -->
    <div class="dashboard-controls">
        <div class="controls-row">
            <div class="control-group">
                <label for="comparison-period-1">Период 1</label>
                <select id="comparison-period-1" class="control-input">
                    <option value="">Загрузка...</option>
                </select>
            </div>
            <div class="control-group">
                <label for="comparison-period-2">Период 2</label>
                <select id="comparison-period-2" class="control-input">
                    <option value="">Загрузка...</option>
                </select>
            </div>
            <div class="control-group control-group-button">
                <label>&nbsp;</label>
                <button id="btn-compare" class="btn">
                    Сравнить периоды
                </button>
            </div>
        </div>
    </div>

    <!-- Loading State -->
    <div id="comparison-loading" class="loading-container hidden">
        <div class="loading-spinner"></div>
        <span class="loading-text">Загрузка данных...</span>
    </div>

    <!-- Empty State -->
    <div id="comparison-empty" class="no-data-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <line x1="18" y1="20" x2="18" y2="10"></line>
            <line x1="12" y1="20" x2="12" y2="4"></line>
            <line x1="6" y1="20" x2="6" y2="14"></line>
        </svg>
        <h3>Выберите периоды для сравнения</h3>
        <p>Используйте селекторы выше или переключите режим сравнения</p>
    </div>

    <!-- Results Container -->
    <div id="comparison-results" class="comparison-results hidden">

        <!-- Top 3 Changes Panel -->
        <div class="comparison-top-changes">
            <div class="comparison-top-changes-header">
                <div class="comparison-top-changes-title">Топ-3 изменения</div>
                <div class="comparison-top-changes-subtitle">Метрики с наибольшими отклонениями</div>
            </div>
            <div id="comparison-top-changes-list" class="comparison-top-changes-list">
                <!-- Заполняется через JS -->
            </div>
        </div>

        <!-- Metric Cards Grid -->
        <div id="comparison-metrics-grid" class="comparison-metrics-grid">
            <!-- Заполняется через JS -->
        </div>

        <!-- Detailed Comparison Table -->
        <div class="comparison-table-section">
            <div class="comparison-table-header">
                <div class="comparison-table-title">Детальное сравнение</div>
                <button id="btn-export-comparison" class="btn btn-secondary">
                    Экспорт
                </button>
            </div>
            <div class="table-wrapper">
                <table class="comparison-table">
                    <thead>
                        <tr>
                            <th>Метрика</th>
                            <th>Период 1</th>
                            <th>Период 2</th>
                            <th>Δ</th>
                            <th>Δ%</th>
                            <th>Тренд</th>
                        </tr>
                    </thead>
                    <tbody id="comparison-table-body">
                        <!-- Заполняется через JS -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>
