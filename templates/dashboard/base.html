<!-- Базовый layout дашборда -->

{% set page_title = "Дашборд" %}
{% set page_subtitle = "Аналитика план vs факт" %}

<div class="container">
    {% include 'shared/nav.html' %}

    <!-- Dashboard Controls - Единый блок управления -->
    <div class="dashboard-controls">
        <div class="controls-row">
            <!-- Venue Selector -->
            <div class="control-group">
                <label for="venue-selector">Бар</label>
                <select id="venue-selector" class="control-input">
                    <option value="">Загрузка...</option>
                </select>
            </div>

            <!-- Period Picker -->
            <div class="control-group">
                <label for="flexi-range-picker">Период анализа</label>
                <input
                    type="text"
                    id="flexi-range-picker"
                    class="control-input"
                    placeholder="Выберите период"
                    readonly
                >
            </div>

            <!-- Export Buttons -->
            <div class="control-group control-group-button">
                <label>&nbsp;</label>
                <div class="export-btn-group">
                    <button id="btn-export-excel" class="btn btn-secondary export-btn" title="Экспорт в Excel">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>
                        Excel
                    </button>
                    <button id="btn-export-pdf" class="btn btn-secondary export-btn" title="Экспорт в PDF">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                        PDF
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Tabs Navigation -->
    <div class="tabs-container">
        <div class="tabs-nav">
            <div class="tabs-buttons">
                <button class="tab-button active" data-tab="tab-analytics">
                    Аналитика
                </button>
                <button class="tab-button" data-tab="tab-charts" style="display: none;">
                    Графики
                </button>
                <button class="tab-button" data-tab="tab-comparison">
                    Сравнение
                </button>
            </div>
            <div class="completion-badge" id="completion-badge">
                <span class="completion-value" id="stat-avg-completion">—</span>
            </div>
        </div>

        <!-- Tab Contents -->
        <div id="tab-analytics" class="tab-content active">
            {% include 'dashboard/analytics_tab.html' %}
        </div>

        <div id="tab-charts" class="tab-content">
            {% include 'dashboard/charts_tab.html' %}
        </div>

        <div id="tab-comparison" class="tab-content">
            {% include 'dashboard/comparison_tab.html' %}
        </div>
    </div>
</div>

<!-- Messages Container -->
<div id="messages-container" class="messages-container"></div>
