<!-- Базовый layout дашборда -->
<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <h1>Дашборд</h1>
            <div class="subtitle">Аналитика план vs факт</div>
        </div>

        <div class="header-right">
            <!-- Navigation Links -->
            <div class="nav-links">
                <a href="/" class="nav-link active">Дашборд</a>
                <a href="/packaging" class="nav-link">ABC/XYZ фасовки</a>
                <a href="/draft" class="nav-link">Разливное</a>
                <a href="/waiters" class="nav-link">Бармены</a>
                <a href="/employee" class="nav-link">Сотрудник</a>
                <a href="/taps" class="nav-link">Краны</a>
                <a href="/stocks" class="nav-link">Остатки</a>
            </div>

            <!-- API Status and Theme Toggle -->
            <div class="header-actions">
                <div class="api-status checking" id="api-status" onclick="window.dashboardCheckApi()" title="Нажмите для проверки подключения">
                    <div class="api-status-indicator"></div>
                    <span class="api-status-text">Проверка подключения...</span>
                </div>
                <div class="theme-toggle">
                    <button class="theme-btn active" onclick="window.dashboardSetTheme('light')">Светлая</button>
                    <button class="theme-btn" onclick="window.dashboardSetTheme('dark')">Тёмная</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Dashboard Controls - Единый блок управления -->
    <div class="dashboard-controls">
        <div class="controls-row">
            <!-- Venue Selector -->
            <div class="control-group">
                <label for="venue-selector">Бар</label>
                <select id="venue-selector" class="control-input">
                    <option value="">Загрузка...</option>
                </select>
            </div>

            <!-- Period Picker -->
            <div class="control-group">
                <label for="flexi-range-picker">Период анализа</label>
                <input
                    type="text"
                    id="flexi-range-picker"
                    class="control-input"
                    placeholder="Выберите период"
                    readonly
                >
            </div>

            <!-- Export Button -->
            <div class="control-group control-group-button">
                <label>&nbsp;</label>
                <button id="btn-export-pdf" class="btn btn-secondary" title="Экспорт в PDF">
                    PDF
                </button>
            </div>
        </div>
    </div>

    <!-- Tabs Navigation -->
    <div class="tabs-container">
        <div class="tabs-nav">
            <div class="tabs-buttons">
                <button class="tab-button active" data-tab="tab-analytics">
                    Аналитика
                </button>
                <button class="tab-button" data-tab="tab-charts" style="display: none;">
                    Графики
                </button>
                <button class="tab-button" data-tab="tab-comparison">
                    Сравнение
                </button>
            </div>
            <div class="completion-badge" id="completion-badge">
                <span class="completion-value" id="stat-avg-completion">—</span>
            </div>
        </div>

        <!-- Tab Contents -->
        <div id="tab-analytics" class="tab-content active">
            {% include 'dashboard/analytics_tab.html' %}
        </div>

        <div id="tab-charts" class="tab-content">
            {% include 'dashboard/charts_tab.html' %}
        </div>

        <div id="tab-comparison" class="tab-content">
            {% include 'dashboard/comparison_tab.html' %}
        </div>
    </div>
</div>

<!-- Messages Container -->
<div id="messages-container" class="messages-container"></div>
