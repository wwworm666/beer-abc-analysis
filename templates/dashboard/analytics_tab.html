<!-- Вкладка "Аналитика" - План vs Факт -->

<!-- Loading State -->
<div id="loading-state" class="loading-container hidden">
    <div class="loading-spinner"></div>
</div>

<!-- No Plan State -->
<div id="no-plan-state" class="no-plan-state hidden">
    <h3>План не задан</h3>
    <p>Для этого периода пока нет плановых показателей.</p>
    <button class="btn" onclick="document.querySelector('[data-tab=&quot;tab-plans&quot;]').click()">
        Создать план
    </button>
</div>

<!-- Metrics Grid -->
<div id="metrics-grid" class="metrics-grid hidden">
    <!-- Карточки метрик будут добавлены через JavaScript -->
</div>

<!-- Meeting Notes -->
<div id="meeting-notes" class="meeting-notes hidden">
    <div class="meeting-notes-header">
        <div class="meeting-notes-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            Заметки к собранию
        </div>
        <span class="meeting-notes-status" id="notes-status"></span>
    </div>
    <textarea
        id="meeting-notes-text"
        class="meeting-notes-textarea"
        placeholder="Заметки по итогам недели: что обсудили, решения, задачи..."
        rows="4"
    ></textarea>

    <!-- History toggle -->
    <button class="notes-history-toggle" id="notes-history-toggle">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        <span id="notes-history-toggle-text">Показать предыдущие</span>
    </button>
    <div class="notes-history hidden" id="notes-history">
        <!-- JS renders history items here -->
    </div>
</div>

<!-- Template для карточки метрики -->
{% include 'dashboard/components/metric_card.html' %}
