<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гости — Пивная культура</title>
    <!-- Shared CSS -->
    <link rel="stylesheet" href="/static/dashboard/styles/fonts.css">
    <link rel="stylesheet" href="/static/dashboard/styles/variables.css">
    <link rel="stylesheet" href="/static/dashboard/styles/base.css">
    <link rel="stylesheet" href="/static/dashboard/styles/sidebar.css">
    <link rel="stylesheet" href="/static/dashboard/styles/mobile.css">
    <link rel="stylesheet" href="/static/logo.css">
    <link rel="stylesheet" href="/static/guests/guests.css?v={{ app_version }}">
</head>
<body class="guests-page">
    <div class="container">
        {% set page_title = "Гости" %}
        {% set page_subtitle = "Аналитика гостей и программы лояльности" %}
        {% include 'shared/nav.html' %}
    </div>

    <div class="guests-wrap">
        <!-- Период: тип + навигация стрелками -->
        <div class="guests-controls">
            <div class="period-types" id="periodTypes">
                <button class="ptype-btn" data-ptype="week">Неделя</button>
                <button class="ptype-btn active" data-ptype="month">Месяц</button>
                <button class="ptype-btn" data-ptype="quarter">Квартал</button>
                <button class="ptype-btn" data-ptype="year">Год</button>
            </div>
            <div class="period-nav">
                <button class="pnav-btn" id="periodPrev" title="Предыдущий период">&larr;</button>
                <span class="period-label" id="periodLabel">&nbsp;</span>
                <button class="pnav-btn" id="periodNext" title="Следующий период">&rarr;</button>
            </div>
            <div class="coverage-banner" id="coverageBanner" title="Диапазон загруженных чеков программы лояльности"></div>
            {% if current_user and current_user.is_admin %}
            <button class="sync-btn" id="syncBtn" title="Дозагрузить свежие чеки из iiko (текущий месяц)">Обновить данные</button>
            {% endif %}
        </div>

        <!-- Вкладки разделов -->
        <div class="guests-tabs" id="guestsTabs">
            <button class="gtab-btn active" data-tab="summary">Сводка</button>
            <button class="gtab-btn" data-tab="growth">Рост и динамика</button>
            <button class="gtab-btn" data-tab="activity">Активность и частота</button>
            <button class="gtab-btn" data-tab="cohorts">Когорты</button>
            <button class="gtab-btn" data-tab="rfm">RFM</button>
            <button class="gtab-btn" data-tab="ltv">LTV</button>
            <button class="gtab-btn" data-tab="products">Товары</button>
            <button class="gtab-btn" data-tab="venues">Точки</button>
            <button class="gtab-btn" data-tab="guest">Гость</button>
        </div>

        <div class="tab-panes">
            <div class="gtab-pane active" id="pane-summary"><div class="pane-loading">Загрузка…</div></div>
            <div class="gtab-pane" id="pane-growth"></div>
            <div class="gtab-pane" id="pane-activity"></div>
            <div class="gtab-pane" id="pane-cohorts"></div>
            <div class="gtab-pane" id="pane-rfm"></div>
            <div class="gtab-pane" id="pane-ltv"></div>
            <div class="gtab-pane" id="pane-products"></div>
            <div class="gtab-pane" id="pane-venues"></div>
            <div class="gtab-pane" id="pane-guest"></div>
        </div>
    </div>

    <script src="/static/libs/chart.umd.min.js"></script>
    <script src="/static/js/guests/formulas.js?v={{ app_version }}"></script>
    <script src="/static/js/guests/common.js?v={{ app_version }}"></script>
    <script src="/static/js/guests/charts.js?v={{ app_version }}"></script>
    <script src="/static/js/guests/views-summary.js?v={{ app_version }}"></script>
    <script src="/static/js/guests/views-growth.js?v={{ app_version }}"></script>
    <script src="/static/js/guests/views-activity.js?v={{ app_version }}"></script>
    <script src="/static/js/guests/views-cohorts.js?v={{ app_version }}"></script>
    <script src="/static/js/guests/views-rfm.js?v={{ app_version }}"></script>
    <script src="/static/js/guests/views-ltv.js?v={{ app_version }}"></script>
    <script src="/static/js/guests/views-products.js?v={{ app_version }}"></script>
    <script src="/static/js/guests/views-venues.js?v={{ app_version }}"></script>
    <script src="/static/js/guests/views-guest.js?v={{ app_version }}"></script>
</body>
</html>
