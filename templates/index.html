<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beer ABC/XYZ Analysis</title>
    <!-- Shared CSS -->
    <link rel="stylesheet" href="/static/dashboard/styles/fonts.css">
    <link rel="stylesheet" href="/static/dashboard/styles/variables.css">
    <link rel="stylesheet" href="/static/dashboard/styles/base.css">
    <link rel="stylesheet" href="/static/dashboard/styles/sidebar.css">
    <link rel="stylesheet" href="/static/dashboard/styles/mobile.css">
    <link rel="stylesheet" href="/static/dashboard/styles/cards.css">
    <link rel="stylesheet" href="/static/logo.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/ru.js"></script>
    <style>
        /* Card */
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 32px;
            margin-bottom: 24px;
            transition: all 0.2s ease;
        }

        .card:hover {
            box-shadow: 0 4px 12px var(--shadow);
            transform: translateY(-2px);
        }

        /* Controls */
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        select, input {
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--bg-secondary);
        }

        /* Button */
        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: auto;
        }

        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px var(--shadow);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 60px 32px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .loading p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Results */
        .results {
            display: none;
        }

        .results.active {
            display: block;
        }

        .bar-section {
            margin-bottom: 40px;
        }

        .bar-header {
            margin-bottom: 32px;
        }

        .bar-header h2 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: var(--text-primary);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 24px;
            transition: all 0.2s ease;
        }

        .stat-card:hover {
            border-color: var(--accent);
        }

        .stat-card .label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
        }

        /* Section Title */
        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 40px 0 20px 0;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        /* ABC Matrix */
        .abc-matrix {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }

        /* Fintech-стиль: плашка белая с тонким бордером, цвет передаётся LED в углу */
        .abc-card {
            position: relative;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 14px;
            padding: 18px 16px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .abc-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(26, 26, 26, 0.08);
            border-color: var(--border-color);
        }

        .abc-card .led {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-tertiary);
        }
        .abc-card.led-success  .led { background: #10b981; box-shadow: 0 0 8px rgba(16, 185, 129, 0.45); }
        .abc-card.led-accent   .led { background: #D97757; box-shadow: 0 0 8px rgba(217, 119, 87, 0.45); }
        .abc-card.led-warning  .led { background: #f59e0b; box-shadow: 0 0 8px rgba(245, 158, 11, 0.45); }
        .abc-card.led-violet   .led { background: #8b5cf6; box-shadow: 0 0 8px rgba(139, 92, 246, 0.45); }
        .abc-card.led-danger   .led { background: #ef4444; box-shadow: 0 0 8px rgba(239, 68, 68, 0.45); }
        .abc-card.led-neutral  .led { background: var(--text-tertiary); box-shadow: none; }

        .abc-card .category {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 4px;
            font-variant-numeric: tabular-nums;
        }

        .abc-card .count {
            font-size: 1.75rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        thead {
            border-bottom: 2px solid var(--border-color);
        }

        th {
            text-align: left;
            padding: 12px 16px;
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .beer-row {
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .beer-row:hover {
            background: var(--bg-tertiary);
        }

        /* Badge */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            font-variant-numeric: tabular-nums;
        }

        .badge.bucket-stars {
            background: var(--success);
            color: white;
        }
        .badge.bucket-workhorses,
        .badge.bucket-premium {
            background: var(--accent);
            color: white;
        }
        .badge.bucket-price-up {
            background: var(--warning);
            color: white;
        }
        .badge.bucket-background {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        .badge.bucket-remove {
            background: var(--danger);
            color: white;
        }
        /* XYZ standalone badges */
        .badge.demand-x { background: var(--success); color: white; }
        .badge.demand-y { background: var(--warning); color: white; }
        .badge.demand-z { background: var(--danger); color: white; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 40px;
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 40px;
            max-width: 1200px;
            width: 100%;
            max-height: calc(100vh - 80px);
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: var(--text-secondary);
            line-height: 1;
            transition: color 0.2s ease;
            padding: 0;
            width: 32px;
            height: 32px;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        /* Chart */
        .chart-container {
            margin: 20px 0;
            padding: 24px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
        }

        .chart-icon {
            cursor: pointer;
            font-size: 1.2rem;
            transition: transform 0.2s ease;
            display: inline-block;
        }

        .chart-icon:hover {
            transform: scale(1.2);
        }

        /* Error */
        .error {
            background: var(--danger);
            color: white;
            padding: 16px 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
        }

        .error.active {
            display: block;
        }

        /* Revenue Metrics Cards */
        .revenue-metrics {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .metric-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .metric-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--accent);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .metric-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow);
        }

        .metric-card:hover::before {
            transform: scaleX(1);
        }

        .metric-card.current::before { background: #3b82f6; }
        .metric-card.plan::before { background: #10b981; }
        .metric-card.expected::before { background: #f59e0b; }
        .metric-card.average::before { background: #8b5cf6; }

        .metric-card .metric-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .metric-card .metric-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
            margin-bottom: 4px;
        }

        .metric-card .metric-sub {
            font-size: 0.8rem;
            color: var(--text-tertiary);
        }

        .metric-card .metric-sub.positive { color: #10b981; }
        .metric-card .metric-sub.negative { color: #ef4444; }

        /* Completion bar */
        .completion-bar {
            height: 4px;
            background: var(--bg-secondary);
            border-radius: 2px;
            margin-top: 12px;
            overflow: hidden;
        }

        .completion-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-hover));
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-tertiary);
        }

        input[readonly] { cursor: pointer; }
        .flatpickr-calendar { border-radius: 6px; border: 1px solid var(--border-color); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        [data-theme="dark"] .flatpickr-calendar { background: var(--bg-secondary); border-color: var(--border-color); }
        [data-theme="dark"] .flatpickr-months, [data-theme="dark"] .flatpickr-weekdays, [data-theme="dark"] .flatpickr-month { background: var(--bg-secondary); }
        [data-theme="dark"] .flatpickr-current-month .flatpickr-monthDropdown-months, [data-theme="dark"] .flatpickr-current-month input.cur-year, [data-theme="dark"] .flatpickr-weekday, [data-theme="dark"] .flatpickr-month .flatpickr-prev-month, [data-theme="dark"] .flatpickr-month .flatpickr-next-month { color: var(--text-primary); fill: var(--text-primary); }
        [data-theme="dark"] .flatpickr-day { color: var(--text-primary); }
        [data-theme="dark"] .flatpickr-day:hover { background: var(--bg-tertiary); border-color: var(--bg-tertiary); }
        .flatpickr-day.selected, .flatpickr-day.startRange, .flatpickr-day.endRange { background: var(--accent) !important; border-color: var(--accent) !important; }
        .flatpickr-day.inRange { background: rgba(217,119,87,0.15) !important; border-color: transparent !important; box-shadow: -5px 0 0 rgba(217,119,87,0.15), 5px 0 0 rgba(217,119,87,0.15); }
        [data-theme="dark"] .flatpickr-day.inRange { background: rgba(217,119,87,0.25) !important; box-shadow: -5px 0 0 rgba(217,119,87,0.25), 5px 0 0 rgba(217,119,87,0.25); }

        /* Responsive - Tablet */
        @media (max-width: 1024px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .abc-matrix {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            }
        }

        /* Responsive - Mobile */
        @media (max-width: 768px) {
            .container {
                padding: 20px 12px;
            }

            .revenue-metrics {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .metric-card .metric-value {
                font-size: 1.25rem;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }


            /* Cards */
            .card {
                padding: 20px 16px;
            }

            /* ABC Matrix */
            .abc-matrix {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }

            .abc-card {
                padding: 12px 8px;
            }

            .abc-card .category {
                font-size: 1rem;
            }

            .abc-card .count {
                font-size: 1.25rem;
            }

            /* Tables - horizontal scroll */
            .card {
                overflow-x: auto;
            }

            table {
                min-width: 600px;
                font-size: 0.8rem;
            }

            th, td {
                padding: 10px 8px;
            }

            /* Modal */
            .modal-content {
                padding: 20px;
                max-width: 95%;
            }

            .modal-header h2 {
                font-size: 1.2rem;
            }

            /* Stats in bar sections */
            .stat-card .value {
                font-size: 1.5rem;
            }
        }

        /* Extra small screens */
        @media (max-width: 480px) {
            .container {
                padding: 16px 8px;
            }

            .revenue-metrics {
                grid-template-columns: 1fr;
            }

            .abc-matrix {
                grid-template-columns: repeat(2, 1fr);
            }

            .stat-card .value {
                font-size: 1.25rem;
            }

            table {
                min-width: 500px;
                font-size: 0.75rem;
            }

            th, td {
                padding: 8px 6px;
            }

            .badge {
                padding: 3px 8px;
                font-size: 0.65rem;
            }
        }
        /* Tooltips */
        .tooltip-wrapper {
            position: relative;
            display: inline-block;
        }

        .tooltip {
            visibility: hidden;
            opacity: 0;
            position: absolute;
            z-index: 1000;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 12px var(--shadow);
            white-space: nowrap;
            font-size: 0.85rem;
            font-weight: 500;
            line-height: 1.4;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }

        .tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: var(--border-color) transparent transparent transparent;
        }

        .tooltip-wrapper:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }

        .tooltip strong {
            color: var(--accent);
        }

        .tooltip .emoji {
            margin-right: 4px;
        }

    </style>
</head>
<body>
    <div class="container">
        {% set page_title = "ABC/XYZ анализ" %}
        {% set page_subtitle = "Классификация ассортимента по выручке и стабильности" %}
        {% include 'shared/nav.html' %}

        <div class="card">
            <!-- Переключатель режима анализа -->
            <div style="margin-bottom: 24px;">
                <label style="margin-bottom: 12px; display: block;">Режим анализа</label>
                <div class="theme-toggle">
                    <button class="theme-btn active" id="mode-beers" onclick="setAnalysisMode('beers')">По бутылкам</button>
                    <button class="theme-btn" id="mode-categories" onclick="setAnalysisMode('categories')">По категориям</button>
                </div>
            </div>

            <div class="controls">
                <div class="form-group">
                    <label for="bar-select">Бар</label>
                    <select id="bar-select">
                        <option value="">Общая</option>
                        {% for bar in bars %}
                        <option value="{{ bar }}">{{ bar }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="date-range">Период</label>
                    <input type="text" id="date-range" placeholder="Выберите период" readonly>
                </div>

                <div class="form-group">
                    <label>&nbsp;</label>
                    <button class="btn" onclick="runAnalysis()">Запустить анализ</button>
                </div>
            </div>
        </div>

        <div class="error" id="error-message"></div>

        <div class="card loading" id="loading">
            <div class="spinner"></div>
            <h2>Анализируем данные...</h2>
            <p>Это может занять несколько секунд</p>
        </div>

        <div class="results" id="results"></div>
    </div>

    <script>
        let currentData = {};
        let activeCharts = {};
        let analysisMode = 'beers'; // 'beers' или 'categories'

        // API Connection Status Check
        window.dashboardCheckApi = async function() {
            const statusElement = document.getElementById('api-status');
            const textElement = statusElement.querySelector('.api-status-text');

            statusElement.className = 'api-status checking';
            textElement.textContent = 'Проверка подключения...';

            try {
                const response = await fetch('/api/connection-status');
                const data = await response.json();

                if (response.ok && data.status === 'connected') {
                    statusElement.className = 'api-status connected';
                    textElement.textContent = 'iiko API подключен';
                } else {
                    statusElement.className = 'api-status error';
                    textElement.textContent = 'Ошибка подключения';
                    console.error('API connection error:', data.message);
                }
            } catch (error) {
                statusElement.className = 'api-status error';
                textElement.textContent = 'Ошибка подключения';
                console.error('API connection error:', error);
            }
        }

        // Check connection on page load
        document.addEventListener('DOMContentLoaded', function() {
            window.dashboardCheckApi();
            setInterval(window.dashboardCheckApi, 60000);
            initDatePicker();
        });

        let datePicker = null;

        function initDatePicker() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const dayOfWeek = today.getDay();
            const daysFromMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
            const lastMonday = new Date(today);
            lastMonday.setDate(today.getDate() - daysFromMonday - 7);
            const lastSunday = new Date(lastMonday);
            lastSunday.setDate(lastMonday.getDate() + 6);

            datePicker = flatpickr('#date-range', {
                mode: 'range',
                dateFormat: 'd.m.Y',
                locale: 'ru',
                maxDate: '2026-12-31',
                defaultDate: [lastMonday, lastSunday]
            });
        }

        function getPickerDates() {
            if (!datePicker || !datePicker.selectedDates || datePicker.selectedDates.length < 2) return null;
            const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            return { from: fmt(datePicker.selectedDates[0]), to: fmt(datePicker.selectedDates[1]) };
        }

        // Analysis mode management
        function setAnalysisMode(mode) {
            analysisMode = mode;

            document.querySelectorAll('#mode-beers, #mode-categories').forEach(btn => {
                btn.classList.remove('active');
            });

            if (mode === 'beers') {
                document.getElementById('mode-beers').classList.add('active');
            } else {
                document.getElementById('mode-categories').classList.add('active');
            }
        }

        async function runAnalysis() {
            const bar = document.getElementById('bar-select').value;
            const dates = getPickerDates();

            if (!dates) {
                showError('Пожалуйста, выберите период');
                return;
            }

            const dateFrom = dates.from;
            const dateTo = dates.to;

            document.getElementById('loading').classList.add('active');
            document.getElementById('results').classList.remove('active');
            document.getElementById('error-message').classList.remove('active');

            try {
                // Выбираем endpoint в зависимости от режима
                const endpoint = analysisMode === 'categories' ? '/api/categories' : '/api/analyze';

                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ bar, date_from: dateFrom, date_to: dateTo })
                });

                if (!response.ok) {
                    throw new Error('Ошибка при получении данных');
                }

                const data = await response.json();
                currentData = data;

                // Отображаем результаты в зависимости от режима
                if (analysisMode === 'categories') {
                    displayCategoryResults(data);
                } else {
                    displayResults(data);
                }

            } catch (error) {
                console.error('Error:', error);
                showError('Ошибка: ' + error.message);
            } finally {
                document.getElementById('loading').classList.remove('active');
            }
        }

                const section = createBarSection(barName, barData);
                resultsDiv.appendChild(section);
            }

            resultsDiv.classList.add('active');
        }

        async function showWeeklyChart(event, barName, beerName, rowId) {
            event.stopPropagation();
            
            const chartRow = document.getElementById(`chart-row-${rowId}`);
            
            if (chartRow && chartRow.style.display !== 'none') {
                chartRow.style.display = 'none';
                if (activeCharts[rowId]) {
                    activeCharts[rowId].destroy();
                    delete activeCharts[rowId];
                }
                return;
            }
            
            if (chartRow) {
                chartRow.style.display = 'table-row';
            }
            
            try {
                const response = await fetch(`/api/weekly-chart/${encodeURIComponent(barName)}/${encodeURIComponent(beerName)}`);
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Не удалось получить данные');
                }
                
                const data = await response.json();
                
                const canvas = document.getElementById(`chart-${rowId}`);
                if (!canvas) return;
                
                const ctx = canvas.getContext('2d');
                
                if (activeCharts[rowId]) {
                    activeCharts[rowId].destroy();
                }

                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                
                activeCharts[rowId] = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.weeks,
                        datasets: [{
                            label: 'Продажи (шт)',
                            data: data.sales,
                            borderColor: isDark ? '#3b82f6' : '#0066cc',
                            backgroundColor: isDark ? 'rgba(59, 130, 246, 0.1)' : 'rgba(0, 102, 204, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.3,
                            pointRadius: 4,
                            pointHoverRadius: 6,
                            pointBackgroundColor: isDark ? '#3b82f6' : '#0066cc',
                            pointBorderColor: isDark ? '#1a1a1a' : '#ffffff',
                            pointBorderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: false
                            },
                            title: {
                                display: true,
                                text: beerName,
                                color: isDark ? '#e0e0e0' : '#1a1a1a',
                                font: {
                                    size: 14,
                                    weight: '600'
                                },
                                padding: {
                                    bottom: 20
                                }
                            },
                            tooltip: {
                                backgroundColor: isDark ? '#2a2a2a' : '#ffffff',
                                titleColor: isDark ? '#e0e0e0' : '#1a1a1a',
                                bodyColor: isDark ? '#e0e0e0' : '#1a1a1a',
                                borderColor: isDark ? '#333333' : '#e0e0e0',
                                borderWidth: 1,
                                padding: 12,
                                displayColors: false,
                                callbacks: {
                                    label: function(context) {
                                        return `${context.parsed.y} шт`;
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    stepSize: 1,
                                    color: isDark ? '#666666' : '#999999'
                                },
                                grid: {
                                    color: isDark ? '#2a2a2a' : '#f5f5f5'
                                },
                                border: {
                                    display: false
                                }
                            },
                            x: {
                                ticks: {
                                    color: isDark ? '#666666' : '#999999'
                                },
                                grid: {
                                    display: false
                                },
                                border: {
                                    display: false
                                }
                            }
                        }
                    }
                });
                
                canvas.style.height = '300px';
                
            } catch (error) {
                console.error('Ошибка загрузки графика:', error);
                alert('Не удалось загрузить график: ' + error.message);
                if (chartRow) {
                    chartRow.style.display = 'none';
                }
            }
        }

        function displayCategoryResults(data) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            const bar = document.getElementById('bar-select').value;

            if (bar) {
                // Для одного бара
                const section = createCategorySectionForBar(bar, data);
                resultsDiv.appendChild(section);
            } else {
                // Для всех баров
                for (const [barName, categoryData] of Object.entries(data.categories || {})) {
                    const section = createCategorySectionForBar(barName, { categories: categoryData, summary: data.summary });
                    resultsDiv.appendChild(section);
                }
            }

            resultsDiv.classList.add('active');
        }

                                    <div style="font-size: 0.75rem; color: var(--text-tertiary);">
                                        ${catData.total_beers} фасовок
                                    </div>

                            `;
                        }).join('')}
                    </div>
                `;
            }

            card.innerHTML = header + summaryTable + categoryCards;
            section.appendChild(card);
            return section;
        }

        function showCategoryDetail(barName, categoryName) {
            const categories = currentData.categories || {};
            const catData = categories[categoryName] || (categories[barName] && categories[barName][categoryName]);

            if (!catData) {
                alert('Нет данных для этой категории');
                return;
            }

            const beers = catData.beers || [];
            const hasXYZ = beers.length > 0 && beers[0].XYZ_Category;

            const modalHTML = `
                <div class="modal active" id="category-modal" onclick="closeModalBackdrop(event)">
                    <div class="modal-content" onclick="event.stopPropagation()">
                        <div class="modal-header">
                            <div>
                                <h2>${categoryName} — ${barName}</h2>
                                <p style="color: var(--text-secondary); margin-top: 8px; font-size: 0.9rem;">
                                    ${catData.total_beers} фасовок • Выручка: ${formatMoney(catData.total_revenue)}
                                </p>
                            </div>
                            <button class="modal-close" onclick="closeModal()">&times;</button>
                        </div>

                        <!-- ABC статистика -->
                        <h3 class="section-title">ABC распределение</h3>
                        <div class="abc-matrix" style="margin-bottom: 30px;">
                            ${Object.entries(catData.abc_stats || {})
                                .sort((a, b) => b[1] - a[1])
                                .slice(0, 8)
                                .map(([abc, count]) => `
                                    <div class="abc-card ${getBucketLedClassFromCode(abc)}">
                                        <span class="led"></span>
                                        <div class="category">${abc}</div>
                                        <div class="count">${count}</div>
                                    </div>
                                `).join('')}
                        </div>

                        ${hasXYZ ? `
                            <h3 class="section-title">XYZ распределение</h3>
                            <div class="abc-matrix" style="margin-bottom: 30px;">
                                ${Object.entries(catData.xyz_stats || {})
                                    .map(([xyz, count]) => {
                                        return `
                                            <div class="abc-card ${getXYZLedClass(xyz)}">
                                                <span class="led"></span>
                                                <div class="category">${xyz}</div>
                                                <div class="count">${count}</div>
                                            </div>
                                        `;
                                    }).join('')}
                            </div>
                        ` : ''}

                        <!-- Таблица с пивом -->
                        <h3 class="section-title">Все фасовки</h3>
                        <table>
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Пиво</th>
                                    <th>Кол-во</th>
                                    <th>Выручка</th>
                                    <th>ABC</th>
                                    ${hasXYZ ? '<th>XYZ</th>' : ''}
                                    ${hasXYZ ? '<th>Вариация</th>' : ''}
                                </tr>
                            </thead>
                            <tbody>
                                ${beers
                                    .sort((a, b) => b.TotalRevenue - a.TotalRevenue)
                                    .map((beer, i) => `
                                        <tr class="beer-row">
                                            <td>${i + 1}</td>
                                            <td>${beer.Beer}</td>
                                            <td>${formatNumber(beer.TotalQty)}</td>
                                            <td>${formatMoney(beer.TotalRevenue)}</td>
                                            <td>${wrapWithTooltip(`<span class="badge ${getBucketClass(beer.ABC_Combined)}">${beer.ABC_Combined}</span>`, beer.ABC_Combined)}</td>
                                            ${hasXYZ ? `<td>${wrapWithTooltip(`<span class="badge ${getXYZBadgeClass(beer.XYZ_Category)}">${beer.XYZ_Category}</span>`, beer.XYZ_Category)}</td>` : ''}
                                            ${hasXYZ ? `<td>${beer.CoefficientOfVariation ? beer.CoefficientOfVariation.toFixed(1) + '%' : '—'}</td>` : ''}
                                        </tr>
                                    `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            document.body.insertAdjacentHTML('beforeend', modalHTML);
        }

        function closeModalBackdrop(event) {
            if (event.target.classList.contains('modal')) {
                closeModal();
            }
        }

        function closeModal() {
            const modal = document.getElementById('category-modal');
            if (modal) {
                modal.remove();
            }
            for (let key in activeCharts) {
                if (activeCharts[key]) {
                    activeCharts[key].destroy();
                }
            }
            activeCharts = {};
        }

        function formatMoney(value) {
            return new Intl.NumberFormat('ru-RU', {
                style: 'currency',
                currency: 'RUB',
                maximumFractionDigits: 0
            }).format(value);
        }

        function formatNumber(value) {
            return new Intl.NumberFormat('ru-RU').format(value);
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.classList.add('active');
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
        // 3-буквенный код: выручка (A/B/C) + наценка (A/B/C) + спрос (X/Y/Z).
        // Маржа в рублях — отдельное поле ABC_Margin, в код не входит.
        const BUCKETS_UI = {
            'stars':      { name: 'Ядро',          action: 'Держать всегда',                     led: 'led-success' },
            'workhorses': { name: 'Объём',         action: 'Оставить',                           led: 'led-accent'  },
            'price_up':   { name: 'Недооценённые', action: 'Поднять наценку',                   led: 'led-warning' },
            'premium':    { name: 'Ниша',          action: 'Продвигать',                         led: 'led-violet'  },
            'background': { name: 'База',          action: 'Не трогать',                         led: 'led-neutral' },
            'remove':     { name: 'К выводу',      action: 'Рассмотреть удаление',               led: 'led-danger'  }
        };

        const REV_MARKUP_TO_BUCKET = {
            'AA': 'stars',      'AB': 'workhorses', 'AC': 'price_up',
            'BA': 'workhorses', 'BB': 'background', 'BC': 'price_up',
            'CA': 'premium',    'CB': 'background', 'CC': 'remove'
        };

        const REV_DESC = {
            'A': 'Топ выручка',
            'B': 'Средняя выручка',
            'C': 'Низкая выручка'
        };
        const MARKUP_DESC = {
            'A': 'Высокая наценка (>=120%)',
            'B': 'Средняя наценка (100-120%)',
            'C': 'Низкая наценка (<100%)'
        };
        const DEMAND_DESC = {
            'X': 'Стабильный спрос (CV<10%)',
            'Y': 'Умеренные колебания (10-25%)',
            'Z': 'Нестабильный спрос (>=25%)'
        };

        function getBucketKey(code) {
            if (!code || code.length < 2) return 'background';
            return REV_MARKUP_TO_BUCKET[code.substring(0, 2)] || 'background';
        }

        function getBucketClass(code) {
            return 'bucket-' + getBucketKey(code).replace('_', '-');
        }

        function getBucketLedClass(bucketKey) {
            return (BUCKETS_UI[bucketKey] && BUCKETS_UI[bucketKey].led) || 'led-neutral';
        }

        function getBucketLedClassFromCode(code) {
            return getBucketLedClass(getBucketKey(code));
        }

        function getXYZBadgeClass(xyz) {
            if (xyz === 'X') return 'demand-x';
            if (xyz === 'Y') return 'demand-y';
            return 'demand-z';
        }

        function getXYZLedClass(xyz) {
            if (xyz === 'X') return 'led-success';
            if (xyz === 'Y') return 'led-warning';
            return 'led-danger';
        }

        function createTooltip(category) {
            if (!category) return '';

            // Одиночная буква спроса: X/Y/Z
            if (category.length === 1 && DEMAND_DESC[category]) {
                return `<span class="tooltip">${DEMAND_DESC[category]}</span>`;
            }

            // Ключ корзины напрямую (для кликов по карточке корзины)
            if (BUCKETS_UI[category]) {
                const b = BUCKETS_UI[category];
                return `<span class="tooltip"><strong>${b.name}</strong><br>${b.action}</span>`;
            }

            // 3-буквенный код
            if (category.length === 3) {
                const rev = category[0], markup = category[1], demand = category[2];
                const bucket = BUCKETS_UI[getBucketKey(category)] || { name: '?', action: '' };
                const parts = [REV_DESC[rev], MARKUP_DESC[markup], DEMAND_DESC[demand]].filter(Boolean).join(' / ');
                return `<span class="tooltip"><strong>${bucket.name}</strong> — ${bucket.action}<br>${parts}</span>`;
            }

            return '';
        }

        function wrapWithTooltip(html, category) {
            return `<span class="tooltip-wrapper">${html}${createTooltip(category)}</span>`;
        }

        // Функция для отображения полного списка позиций
        function showAllBeersList(barName, sortBy) {
            const barData = currentData[barName];
            if (!barData) return;

            const beers = barData.records || [];
            const hasXYZ = beers.length > 0 && beers[0].XYZ_Category;
            const hasBarColumn = beers.length > 0 && beers[0].Bar;

            // Сортируем в зависимости от типа
            let sortedBeers = [...beers];
            let title = '';

            if (sortBy === 'revenue') {
                sortedBeers.sort((a, b) => b.TotalRevenue - a.TotalRevenue);
                title = 'Все позиции по выручке';
            } else if (sortBy === 'quantity') {
                sortedBeers.sort((a, b) => b.TotalQty - a.TotalQty);
                title = 'Все позиции по количеству';
            } else {
                sortedBeers.sort((a, b) => a.Beer.localeCompare(b.Beer));
                title = 'Все позиции (алфавит)';
            }

            const modalHTML = `
                <div class="modal active" id="category-modal" onclick="closeModalBackdrop(event)">
                    <div class="modal-content" onclick="event.stopPropagation()">
                        <div class="modal-header">
                            <div>
                                <h2>${title} — ${barName}</h2>
                                <p style="color: var(--text-secondary); margin-top: 8px; font-size: 0.9rem;">
                                    Всего: ${beers.length} SKU • Бутылок: ${formatNumber(barData.total_qty)} шт • Выручка: ${formatMoney(barData.total_revenue)}
                                </p>
                            </div>
                            <button class="modal-close" onclick="closeModal()">&times;</button>
                        </div>

                        <table>
                            <thead>
                                <tr>
                                    <th>#</th>
                                    ${hasBarColumn ? '<th>Бар</th>' : ''}
                                    <th>Пиво</th>
                                    <th>Стиль</th>
                                    <th>Кол-во</th>
                                    <th>Выручка</th>
                                    <th>ABC</th>
                                    ${hasXYZ ? '<th>XYZ</th>' : ''}
                                    <th>Наценка %</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${sortedBeers.map((beer, i) => `
                                    <tr class="beer-row">
                                        <td>${i + 1}</td>
                                        ${hasBarColumn ? `<td>${beer.Bar}</td>` : ''}
                                        <td>${beer.Beer}</td>
                                        <td>${beer.Style || '—'}</td>
                                        <td>${formatNumber(beer.TotalQty)}</td>
                                        <td>${formatMoney(beer.TotalRevenue)}</td>
                                        <td>${wrapWithTooltip(`<span class="badge ${getBucketClass(beer.ABC_Combined)}">${beer.ABC_Combined}</span>`, beer.ABC_Combined)}</td>
                                        ${hasXYZ ? `<td>${wrapWithTooltip(`<span class="badge ${getXYZBadgeClass(beer.XYZ_Category)}">${beer.XYZ_Category}</span>`, beer.XYZ_Category)}</td>` : ''}
                                        <td>${(beer.AvgMarkupPercent * 100).toFixed(1)}%</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            document.body.insertAdjacentHTML('beforeend', modalHTML);
        }
    </script>
    <script src="/static/logo.js"></script>
</body>
</html>
