<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статистика по официантам</title>
    <!-- Shared CSS -->
    <link rel="stylesheet" href="/static/dashboard/styles/fonts.css">
    <link rel="stylesheet" href="/static/dashboard/styles/variables.css">
    <link rel="stylesheet" href="/static/dashboard/styles/base.css">
    <link rel="stylesheet" href="/static/dashboard/styles/sidebar.css">
    <link rel="stylesheet" href="/static/dashboard/styles/mobile.css">
    <link rel="stylesheet" href="/static/logo.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/ru.js"></script>
    <style>
        /* Card */
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 32px;
            margin-bottom: 24px;
            transition: all 0.2s ease;
        }

        .card:hover {
            box-shadow: 0 4px 12px var(--shadow);
            transform: translateY(-2px);
        }

        /* Controls */
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        select, input {
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--bg-secondary);
        }

        /* Button */
        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: auto;
        }

        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 102, 204, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 60px 32px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .loading p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Results */
        .results {
            display: none;
        }

        .results.active {
            display: block;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 24px;
            transition: all 0.2s ease;
        }

        .stat-card:hover {
            border-color: var(--accent);
        }

        .stat-card .label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
        }

        .stat-card .unit {
            font-size: 1rem;
            color: var(--text-tertiary);
            margin-left: 4px;
        }

        /* Section Title */
        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 40px 0 20px 0;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        thead {
            border-bottom: 2px solid var(--border-color);
        }

        th {
            text-align: left;
            padding: 12px 16px;
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .waiter-row {
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .waiter-row:hover {
            background: var(--bg-tertiary);
        }

        /* Error */
        .error {
            background: var(--danger);
            color: white;
            padding: 16px 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
        }

        .error.active {
            display: block;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 40px;
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            max-height: calc(100vh - 80px);
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: var(--text-secondary);
            line-height: 1;
            transition: color 0.2s ease;
            padding: 0;
            width: 32px;
            height: 32px;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .detail-item {
            padding: 16px;
            background: var(--bg-tertiary);
            border-radius: 6px;
        }

        .detail-item .label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .detail-item .value {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        input[readonly] { cursor: pointer; }

        /* Flatpickr overrides */
        .flatpickr-calendar { border-radius: 6px; border: 1px solid var(--border-color); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        [data-theme="dark"] .flatpickr-calendar { background: var(--bg-secondary); border-color: var(--border-color); }
        [data-theme="dark"] .flatpickr-months, [data-theme="dark"] .flatpickr-weekdays, [data-theme="dark"] .flatpickr-month { background: var(--bg-secondary); }
        [data-theme="dark"] .flatpickr-current-month .flatpickr-monthDropdown-months,
        [data-theme="dark"] .flatpickr-current-month input.cur-year,
        [data-theme="dark"] .flatpickr-weekday,
        [data-theme="dark"] .flatpickr-month .flatpickr-prev-month,
        [data-theme="dark"] .flatpickr-month .flatpickr-next-month { color: var(--text-primary); fill: var(--text-primary); }
        [data-theme="dark"] .flatpickr-day { color: var(--text-primary); }
        [data-theme="dark"] .flatpickr-day:hover { background: var(--bg-tertiary); border-color: var(--bg-tertiary); }
        .flatpickr-day.selected, .flatpickr-day.startRange, .flatpickr-day.endRange { background: var(--accent) !important; border-color: var(--accent) !important; }
        .flatpickr-day.inRange { background: rgba(217,119,87,0.15) !important; border-color: transparent !important; box-shadow: -5px 0 0 rgba(217,119,87,0.15), 5px 0 0 rgba(217,119,87,0.15); }
        [data-theme="dark"] .flatpickr-day.inRange { background: rgba(217,119,87,0.25) !important; box-shadow: -5px 0 0 rgba(217,119,87,0.25), 5px 0 0 rgba(217,119,87,0.25); }

        /* Responsive - Tablet */
        @media (max-width: 1024px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Responsive - Mobile */
        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            /* Cards */
            .card {
                padding: 20px 16px;
                overflow-x: auto;
            }

            /* Tables */
            table {
                min-width: 600px;
                font-size: 0.8rem;
            }

            th, td {
                padding: 10px 8px;
            }

            /* Modal */
            .modal-content {
                padding: 20px;
                max-width: 95%;
            }

            .modal-header h2 {
                font-size: 1.2rem;
            }

            .detail-grid {
                grid-template-columns: 1fr;
            }

            /* Stats */
            .stat-card .value {
                font-size: 1.5rem;
            }
        }

        /* Extra small screens */
        @media (max-width: 480px) {
            .stat-card .value {
                font-size: 1.25rem;
            }

            table {
                min-width: 500px;
                font-size: 0.75rem;
            }

            th, td {
                padding: 8px 6px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        {% set page_title = "Бармены" %}
        {% set page_subtitle = "Статистика и рейтинги" %}
        {% include 'shared/nav.html' %}

        <div class="card">
            <div class="controls">
                <div class="form-group">
                    <label for="bar-select">Бар</label>
                    <select id="bar-select">
                        <option value="">Все бары</option>
                        {% for bar in bars %}
                        <option value="{{ bar }}">{{ bar }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="date-range">Период</label>
                    <input type="text" id="date-range" placeholder="Выберите период" readonly>
                </div>

                <div class="form-group">
                    <label>&nbsp;</label>
                    <button class="btn" onclick="runAnalysis()">Запустить анализ</button>
                </div>
            </div>
        </div>

        <div class="error" id="error-message"></div>

        <div class="card loading" id="loading">
            <div class="spinner"></div>
            <h2>Загружаем статистику...</h2>
            <p>Это может занять несколько секунд</p>
        </div>

        <div class="results" id="results"></div>
    </div>

    <script>
        let currentData = {};

        // API Connection Status Check
        window.dashboardCheckApi = async function() {
            const statusElement = document.getElementById('api-status');
            if (!statusElement) return;
            const textElement = statusElement.querySelector('.api-status-text');

            statusElement.className = 'api-status checking';
            textElement.textContent = 'Проверка подключения...';

            try {
                const response = await fetch('/api/connection-status');
                const data = await response.json();

                if (response.ok && data.status === 'connected') {
                    statusElement.className = 'api-status connected';
                    textElement.textContent = 'iiko API подключен';
                } else {
                    statusElement.className = 'api-status error';
                    textElement.textContent = 'Ошибка подключения';
                    console.error('API connection error:', data.message);
                }
            } catch (error) {
                statusElement.className = 'api-status error';
                textElement.textContent = 'Ошибка подключения';
                console.error('API connection error:', error);
            }
        };

        // Check connection on page load
        document.addEventListener('DOMContentLoaded', function() {
            window.dashboardCheckApi();
            setInterval(window.dashboardCheckApi, 60000);
            initDatePicker();
        });

        let datePicker = null;

        function initDatePicker() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const dayOfWeek = today.getDay();
            const daysFromMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
            const lastMonday = new Date(today);
            lastMonday.setDate(today.getDate() - daysFromMonday - 7);
            const lastSunday = new Date(lastMonday);
            lastSunday.setDate(lastMonday.getDate() + 6);

            datePicker = flatpickr('#date-range', {
                mode: 'range',
                dateFormat: 'd.m.Y',
                locale: 'ru',
                maxDate: '2026-12-31',
                defaultDate: [lastMonday, lastSunday]
            });
        }

        function getPickerDates() {
            if (!datePicker || !datePicker.selectedDates || datePicker.selectedDates.length < 2) return null;
            const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            return { from: fmt(datePicker.selectedDates[0]), to: fmt(datePicker.selectedDates[1]) };
        }

        async function runAnalysis() {
            const bar = document.getElementById('bar-select').value;
            const dates = getPickerDates();

            if (!dates) {
                showError('Пожалуйста, выберите период');
                return;
            }

            const dateFrom = dates.from;
            const dateTo = dates.to;
            const from = new Date(dateFrom);
            const to = new Date(dateTo);
            const days = Math.ceil((to - from) / (1000 * 60 * 60 * 24));

            document.getElementById('loading').classList.add('active');
            document.getElementById('results').classList.remove('active');
            document.getElementById('error-message').classList.remove('active');

            try {
                const requestBody = { bar, days };
                if (dateFrom && dateTo) {
                    requestBody.date_from = dateFrom;
                    requestBody.date_to = dateTo;
                }

                const response = await fetch('/api/waiter-analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    throw new Error('Ошибка при получении данных');
                }

                const data = await response.json();
                currentData = data;
                displayResults(data);

            } catch (error) {
                console.error('Error:', error);
                showError('Ошибка: ' + error.message);
            } finally {
                document.getElementById('loading').classList.remove('active');
            }
        }

        function displayResults(data) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            const card = document.createElement('div');
            card.className = 'card';

            const stats = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="label">Всего официантов</div>
                        <div class="value">${data.total_waiters}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Общий объём</div>
                        <div class="value">${data.total_liters.toFixed(1)}<span class="unit">L</span></div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Порций продано</div>
                        <div class="value">${formatNumber(data.total_portions)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Выручка</div>
                        <div class="value">${formatMoney(data.total_revenue)}</div>
                    </div>
                </div>
            `;

            const hasBarColumn = data.waiters && data.waiters[0] && data.waiters[0].Bar;

            const waitersTable = `
                <h3 class="section-title">Топ официантов по объёму проливов (кликните для деталей)</h3>
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Официант</th>
                            ${hasBarColumn ? '<th>Бар</th>' : ''}
                            <th>Литры</th>
                            <th>Порции</th>
                            <th>Сортов пива</th>
                            <th>Кег 30L</th>
                            <th>Выручка</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${(data.waiters || []).map((waiter, i) => `
                            <tr class="waiter-row" onclick='showWaiterDetails(${JSON.stringify(waiter)})'>
                                <td>${i + 1}</td>
                                <td><strong>${waiter.WaiterName}</strong></td>
                                ${hasBarColumn ? `<td>${waiter.Bar}</td>` : ''}
                                <td>${waiter.TotalLiters.toFixed(1)} L</td>
                                <td>${formatNumber(waiter.TotalPortions)}</td>
                                <td>${waiter.UniqueBeers}</td>
                                <td>${waiter.Kegs30L.toFixed(1)}</td>
                                <td>${formatMoney(waiter.TotalRevenue || 0)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            card.innerHTML = stats + waitersTable;
            resultsDiv.appendChild(card);
            resultsDiv.classList.add('active');
        }

        function showWaiterDetails(waiter) {
            const hasRevenue = waiter.TotalRevenue !== undefined;
            const hasBeers = waiter.beers && waiter.beers.length > 0;

            const beersTable = hasBeers ? `
                <h3 style="margin: 24px 0 16px 0; font-size: 1.1rem; font-weight: 600;">Сорта пива</h3>
                <table style="font-size: 0.85rem;">
                    <thead>
                        <tr>
                            <th>Пиво</th>
                            <th>Литры</th>
                            <th>Порции</th>
                            ${hasRevenue ? '<th>Выручка</th>' : ''}
                            <th>Доля</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${waiter.beers.map(beer => `
                            <tr>
                                <td><strong>${beer.BeerName}</strong></td>
                                <td>${beer.TotalLiters.toFixed(1)} L</td>
                                <td>${formatNumber(beer.TotalPortions)}</td>
                                ${hasRevenue && beer.TotalRevenue ? `<td>${formatMoney(beer.TotalRevenue)}</td>` : ''}
                                <td>${(beer.TotalLiters / waiter.TotalLiters * 100).toFixed(1)}%</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            ` : '';

            const modalHTML = `
                <div class="modal active" id="waiter-modal" onclick="closeModalBackdrop(event)">
                    <div class="modal-content" onclick="event.stopPropagation()">
                        <div class="modal-header">
                            <div>
                                <h2>${waiter.WaiterName}</h2>
                                <p style="color: var(--text-secondary); margin-top: 4px;">${waiter.Bar}</p>
                            </div>
                            <button class="modal-close" onclick="closeModal()">&times;</button>
                        </div>

                        <div class="detail-grid">
                            <div class="detail-item">
                                <div class="label">Объём пролито</div>
                                <div class="value">${waiter.TotalLiters.toFixed(1)} L</div>
                            </div>
                            <div class="detail-item">
                                <div class="label">Порций</div>
                                <div class="value">${formatNumber(waiter.TotalPortions)}</div>
                            </div>
                            <div class="detail-item">
                                <div class="label">Уникальных сортов</div>
                                <div class="value">${waiter.UniqueBeers}</div>
                            </div>
                            <div class="detail-item">
                                <div class="label">Кег 30L</div>
                                <div class="value">${waiter.Kegs30L.toFixed(1)}</div>
                            </div>
                            ${hasRevenue ? `
                                <div class="detail-item">
                                    <div class="label">Выручка</div>
                                    <div class="value">${formatMoney(waiter.TotalRevenue)}</div>
                                </div>
                                <div class="detail-item">
                                    <div class="label">Маржа</div>
                                    <div class="value">${formatMoney(waiter.TotalMargin)}</div>
                                </div>
                            ` : ''}
                        </div>

                        ${beersTable}
                    </div>
                </div>
            `;

            document.body.insertAdjacentHTML('beforeend', modalHTML);
        }

        function closeModalBackdrop(event) {
            if (event.target.classList.contains('modal')) {
                closeModal();
            }
        }

        function closeModal() {
            const modal = document.getElementById('waiter-modal');
            if (modal) {
                modal.remove();
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        function formatMoney(value) {
            return new Intl.NumberFormat('ru-RU', {
                style: 'currency',
                currency: 'RUB',
                maximumFractionDigits: 0
            }).format(value);
        }

        function formatNumber(value) {
            return new Intl.NumberFormat('ru-RU').format(value);
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.classList.add('active');
        }
    </script>
    <script src="/static/logo.js"></script>
</body>
</html>
