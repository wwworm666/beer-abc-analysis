<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анализ скидок</title>
    <!-- Shared CSS -->
    <link rel="stylesheet" href="/static/dashboard/styles/fonts.css">
    <link rel="stylesheet" href="/static/dashboard/styles/variables.css">
    <link rel="stylesheet" href="/static/dashboard/styles/base.css">
    <link rel="stylesheet" href="/static/dashboard/styles/sidebar.css">
    <link rel="stylesheet" href="/static/dashboard/styles/mobile.css">
    <link rel="stylesheet" href="/static/logo.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/ru.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        /* Controls */
        .dashboard-controls {
            margin-bottom: 32px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: 0 1px 3px var(--shadow-sm);
        }

        .controls-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 16px;
            align-items: end;
        }

        .control-group { display: flex; flex-direction: column; }

        .control-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .control-input {
            padding: 12px 20px;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-pill);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-family: var(--font-family);
            transition: all 0.2s ease;
            cursor: pointer;
            width: 100%;
        }

        .control-input:focus, .control-input:hover {
            outline: none;
            border-color: var(--accent);
        }

        .control-input:focus { box-shadow: 0 0 0 3px var(--accent-light); }
        .control-input:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Buttons */
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: var(--border-radius-pill);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--accent);
            color: white;
            font-family: var(--font-family);
            white-space: nowrap;
        }

        .btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Loading */
        .loading { display: none; text-align: center; padding: 60px 32px; }
        .loading.active { display: block; }

        .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; }
        .loading p { color: var(--text-secondary); font-size: 0.85rem; }

        /* Results */
        .results { display: none; }
        .results.active { display: block; }

        /* Metric cards grid — compact, one row */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .metric-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 8px;
            transition: all 0.15s ease;
            min-height: 100px;
        }

        .metric-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26, 26, 26, 0.08);
        }

        .metric-card .metric-name {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            line-height: 1.2;
            white-space: normal;
        }

        .metric-card .metric-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        .metric-card .metric-unit {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            margin-left: 4px;
            font-weight: 400;
        }

        /* Metric grid responsive */
        @media (max-width: 1400px) {
            .metrics-grid { grid-template-columns: repeat(4, 1fr); }
        }
        @media (max-width: 1024px) {
            .metrics-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 768px) {
            .metrics-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* Section title */
        .section-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin: 32px 0 16px 0;
        }

        /* Tables */
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        thead { border-bottom: 2px solid var(--border-color); }

        th {
            text-align: left;
            padding: 14px 16px;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .clickable-row { cursor: pointer; transition: background 0.15s ease; }
        .clickable-row:hover { background: var(--bg-tertiary); }

        /* Table card wrapper */
        .table-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: 0 1px 3px var(--shadow-sm);
            overflow-x: auto;
        }

        /* Error */
        .error-msg {
            background: var(--danger-bg);
            color: var(--danger);
            padding: 14px 20px;
            border-radius: var(--border-radius);
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .error-msg.active { display: block; }

        /* Modal */
        .modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000; padding: 20px; overflow-y: auto;
        }

        .modal.active {
            display: flex; justify-content: center;
            align-items: flex-start; padding-top: 40px;
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 32px;
            max-width: 900px; width: 100%;
            max-height: calc(100vh - 80px);
            overflow-y: auto;
        }

        .modal-header {
            display: flex; justify-content: space-between;
            align-items: flex-start; margin-bottom: 24px;
            padding-bottom: 16px; border-bottom: 1px solid var(--border-color);
        }

        .modal-header h2 { font-size: 1.3rem; font-weight: 700; }

        .modal-close {
            background: none; border: none;
            font-size: 1.8rem; cursor: pointer;
            color: var(--text-secondary); line-height: 1;
            transition: color 0.2s ease; padding: 0;
        }

        .modal-close:hover { color: var(--text-primary); }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px; margin-bottom: 24px;
        }

        .detail-item {
            padding: 16px;
            background: var(--bg-tertiary);
            border-radius: var(--border-radius);
        }

        .detail-item .label { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 4px; }
        .detail-item .value { font-size: 1.15rem; font-weight: 600; }

        input[readonly] { cursor: pointer; }

        /* RFM segment badges */
        .segment-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .segment-badge.champions { background: rgba(16, 185, 129, 0.1); color: #059669; border-color: rgba(16, 185, 129, 0.2); }
        .segment-badge.loyal { background: rgba(59, 130, 246, 0.1); color: #2563eb; border-color: rgba(59, 130, 246, 0.2); }
        .segment-badge.at-risk { background: rgba(249, 115, 22, 0.1); color: #ea580c; border-color: rgba(249, 115, 22, 0.2); }
        .segment-badge.churned { background: rgba(239, 68, 68, 0.1); color: #dc2626; border-color: rgba(239, 68, 68, 0.2); }
        .segment-badge.new { background: rgba(139, 92, 246, 0.1); color: #7c3aed; border-color: rgba(139, 92, 246, 0.2); }
        .segment-badge.potential { background: rgba(6, 182, 212, 0.1); color: #0891b2; border-color: rgba(6, 182, 212, 0.2); }
        .segment-badge.regular { background: var(--bg-tertiary); color: var(--text-secondary); border-color: var(--border-color); }

        /* Legacy segment indicators (for visit-based segmentation) */
        .segment-indicator.new { background: #6366f1; }
        .segment-indicator.returning { background: #f59e0b; }
        .segment-indicator.regular { background: #10b981; }

        /* Segmentation section */
        .segmentation-section {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 24px;
            margin-bottom: 32px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: 0 1px 3px var(--shadow-sm);
        }

        .chart-container {
            position: relative;
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
        }

        .segment-cards {
            display: flex;
            flex-direction: column;
            gap: 12px;
            justify-content: center;
        }

        .segment-card {
            display: grid;
            grid-template-columns: 8px 1fr auto;
            gap: 16px;
            align-items: center;
            padding: 16px 20px;
            background: var(--bg-tertiary);
            border-radius: var(--border-radius);
            transition: transform 0.15s ease;
        }

        .segment-card:hover { transform: translateX(4px); }

        .segment-indicator {
            width: 8px;
            height: 40px;
            border-radius: 4px;
        }

        .segment-info { display: flex; flex-direction: column; gap: 2px; }
        .segment-name { font-size: 0.9rem; font-weight: 600; }
        .segment-desc { font-size: 0.75rem; color: var(--text-tertiary); }

        .segment-stats {
            display: flex;
            gap: 20px;
            text-align: right;
        }

        .segment-stat { display: flex; flex-direction: column; gap: 2px; }
        .segment-stat .label { font-size: 0.7rem; color: var(--text-tertiary); }
        .segment-stat .value { font-size: 1rem; font-weight: 600; }

        @media (max-width: 768px) {
            .segmentation-section { grid-template-columns: 1fr; }
            .chart-container { max-width: 220px; }
            .segment-stats { gap: 12px; }
        }

        /* Flatpickr */
        .flatpickr-calendar { font-family: var(--font-family); border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        [data-theme="dark"] .flatpickr-calendar { background: var(--bg-secondary); border-color: var(--border-color); }
        [data-theme="dark"] .flatpickr-months, [data-theme="dark"] .flatpickr-weekdays, [data-theme="dark"] .flatpickr-month { background: var(--bg-secondary); }
        [data-theme="dark"] .flatpickr-current-month .flatpickr-monthDropdown-months,
        [data-theme="dark"] .flatpickr-current-month input.cur-year,
        [data-theme="dark"] .flatpickr-weekday,
        [data-theme="dark"] .flatpickr-month .flatpickr-prev-month,
        [data-theme="dark"] .flatpickr-month .flatpickr-next-month { color: var(--text-primary); fill: var(--text-primary); }
        [data-theme="dark"] .flatpickr-day { color: var(--text-primary); }
        [data-theme="dark"] .flatpickr-day:hover { background: var(--bg-tertiary); border-color: var(--bg-tertiary); }
        .flatpickr-day.selected, .flatpickr-day.startRange, .flatpickr-day.endRange { background: var(--accent) !important; border-color: var(--accent) !important; }
        .flatpickr-day.inRange { background: rgba(217,119,87,0.15) !important; border-color: transparent !important; box-shadow: -5px 0 0 rgba(217,119,87,0.15), 5px 0 0 rgba(217,119,87,0.15); }
        [data-theme="dark"] .flatpickr-day.inRange { background: rgba(217,119,87,0.25) !important; box-shadow: -5px 0 0 rgba(217,119,87,0.25), 5px 0 0 rgba(217,119,87,0.25); }

        /* RFM Filters Row */
        #rfm-filters.controls-row {
            grid-template-columns: 1fr 1fr 1fr auto;
            background: var(--bg-tertiary);
            padding: 16px 24px;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .controls-row { grid-template-columns: 1fr 1fr; }
            #rfm-filters.controls-row { grid-template-columns: 1fr 1fr; }
            .metrics-grid { gap: 8px; }
            .metric-card { min-width: 120px; }
        }

        @media (max-width: 768px) {
            .controls-row { grid-template-columns: 1fr; }
            .metrics-grid { flex-wrap: wrap; }
            .metric-card { min-width: 100px; flex: 1 1 45%; }
            .table-card { padding: 16px; }
            table { min-width: 500px; font-size: 0.8rem; }
            th, td { padding: 10px 8px; }
            .modal-content { padding: 20px; max-width: 95%; }
            .detail-grid { grid-template-columns: 1fr; }
            .metric-card .metric-value { font-size: 1.1rem; }
        }

        @media (max-width: 480px) {
            .metric-card .metric-value { font-size: 1rem; }
        }

        /* Mode Switcher */
        .mode-switcher {
            display: inline-flex;
            background: var(--bg-tertiary);
            border-radius: var(--border-radius-pill);
            padding: 4px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }

        .mode-btn {
            padding: 10px 24px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.9rem;
            border-radius: var(--border-radius-pill);
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-family);
        }

        .mode-btn:hover {
            color: var(--text-primary);
        }

        .mode-btn.active {
            background: var(--accent);
            color: white;
        }

        /* Hidden utility */
        .hidden {
            display: none !important;
        }

        /* RFM Segment Cards Row */
        .segment-cards-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .segment-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            min-height: 100px;
            cursor: pointer;
        }

        .segment-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(26, 26, 26, 0.12);
            border-color: var(--accent);
        }

        .segment-card.active {
            border-color: var(--accent);
            background: rgba(217, 119, 87, 0.04);
        }

        .segment-card .name {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            line-height: 1.2;
        }

        .segment-card .count {
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        .segment-card .percent {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        /* Segment Card Tooltip */
        .segment-card {
            position: relative;
        }

        .segment-card .tooltip-text {
            visibility: hidden;
            opacity: 0;
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
            font-size: 0.75rem;
            line-height: 1.4;
            text-align: center;
            white-space: nowrap;
            z-index: 100;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }

        .segment-card .tooltip-text::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border: 5px solid transparent;
            border-top-color: var(--border-color);
        }

        .segment-card:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

        /* Visualization Tabs */
        .visualization-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .tab-btn {
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: var(--border-radius);
            transition: all 0.2s;
            font-family: var(--font-family);
        }

        .tab-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .tab-btn.active {
            background: var(--accent);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        @media (max-width: 1024px) {
            .segment-cards-row { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 768px) {
            .segment-cards-row { grid-template-columns: repeat(2, 1fr); }
            .mode-switcher { flex-direction: column; }
            .mode-btn { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        {% set page_title = "Анализ акций" %}
        {% set page_subtitle = "ROI скидок, сегментация гостей, эффективность промо" %}
        {% include 'shared/nav.html' %}

        <!-- Mode Switcher -->
        <div class="mode-switcher">
            <button class="mode-btn active" data-mode="discounts" onclick="switchMode('discounts')">
                Скидки
            </button>
            <button class="mode-btn" data-mode="rfm" onclick="switchMode('rfm')">
                RFM-сегментация
            </button>
        </div>

        <!-- Discount Mode Controls -->
        <div class="dashboard-controls" id="discount-controls">
            <div class="controls-row">
                <div class="control-group">
                    <label for="bar-select">Бар</label>
                    <select id="bar-select" class="control-input">
                        <option value="">Все бары</option>
                        {% for bar in bars %}
                        <option value="{{ bar }}">{{ bar }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="control-group">
                    <label for="date-range">Период</label>
                    <input type="text" id="date-range" class="control-input" placeholder="Выберите период" readonly>
                </div>

                <div class="control-group">
                    <label for="discount-select">Скидка</label>
                    <select id="discount-select" class="control-input">
                        <option value="">Загрузка...</option>
                    </select>
                </div>

                <div class="control-group" style="justify-content: flex-end;">
                    <button class="btn" id="btn-load" onclick="loadData()">Анализировать</button>
                </div>
            </div>

            <!-- RFM Filters -->
            <div class="controls-row" id="rfm-filters" style="margin-top: 16px; display: none;">
                <div class="control-group">
                    <label for="segment-filter">Сегмент</label>
                    <select id="segment-filter" class="control-input" onchange="applyFilters()">
                        <option value="all">Все сегменты</option>
                        <option value="CHAMPIONS">Чемпионы</option>
                        <option value="CHURNED">Ушедшие</option>
                        <option value="AT_RISK">В риске</option>
                        <option value="NEW">Новички</option>
                        <option value="LOYAL">Лояльные</option>
                        <option value="POTENTIAL">Потенциальные</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="recency-filter">Recency</label>
                    <select id="recency-filter" class="control-input" onchange="applyFilters()">
                        <option value="all">Любой</option>
                        <option value="0-7">0-7 дней (Активные)</option>
                        <option value="8-14">8-14 дней</option>
                        <option value="15-30">15-30 дней</option>
                        <option value="31-60">31-60 дней</option>
                        <option value="60+">60+ дней (Ушедшие)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="frequency-filter">Частота</label>
                    <select id="frequency-filter" class="control-input" onchange="applyFilters()">
                        <option value="all">Любая</option>
                        <option value="3+">3+ раз/нед (VIP)</option>
                        <option value="2-3">2-3 раза/нед</option>
                        <option value="1-2">1-2 раза/нед</option>
                        <option value="0-1">&lt;1 раза/нед</option>
                    </select>
                </div>

                <div class="control-group" style="justify-content: flex-end; padding-bottom: 2px;">
                    <button class="btn" onclick="clearFilters()" style="background: var(--bg-tertiary); color: var(--text-primary);">Сбросить</button>
                </div>
            </div>
        </div>

        <!-- RFM Mode Controls -->
        <div class="dashboard-controls hidden" id="rfm-controls">
            <div class="controls-row">
                <div class="control-group">
                    <label for="rfm-date-range">Период</label>
                    <input type="text" id="rfm-date-range" class="control-input" placeholder="Выберите период" readonly>
                </div>
                <div class="control-group">
                    <label for="rfm-bar-select">Бар</label>
                    <select id="rfm-bar-select" class="control-input">
                        <option value="">Все бары</option>
                        {% for bar in bars %}
                        <option value="{{ bar }}">{{ bar }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="control-group" style="justify-content: flex-end;">
                    <button class="btn" id="btn-rfm-load" onclick="loadRfmData()">Обновить</button>
                </div>
            </div>
        </div>

        <div class="error-msg" id="error-message"></div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <h2>Загружаем данные из iiko...</h2>
            <p>Это может занять несколько секунд</p>
        </div>

        <!-- Discount Mode Results -->
        <div class="results" id="discount-results"></div>

        <!-- RFM Mode Results -->
        <div class="results hidden" id="rfm-results">
            <!-- RFM Segment Cards -->
            <div class="segment-cards-row" id="rfm-segment-cards"></div>

            <!-- RFM Metrics -->
            <div class="metrics-grid" id="rfm-metrics"></div>

            <!-- RFM Guests Table with Filters -->
            <div class="table-card" id="rfm-guests-table"></div>

            <!-- RFM Visualizations (Tabs) -->
            <div class="table-card" id="rfm-visualizations" style="margin-top: 24px;"></div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="guest-modal" onclick="if(event.target===this)closeModal()">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Детали гостя</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        let allData = null;
        let datePicker = null;

        // === API Status ===
        window.dashboardCheckApi = async function() {
            const el = document.getElementById('api-status');
            const text = el.querySelector('.api-status-text');
            el.className = 'api-status checking';
            text.textContent = 'Проверка...';
            try {
                const r = await fetch('/api/connection-status');
                const d = await r.json();
                if (r.ok && d.status === 'connected') {
                    el.className = 'api-status connected';
                    text.textContent = 'iiko подключен';
                } else {
                    el.className = 'api-status error';
                    text.textContent = 'Нет связи';
                }
            } catch {
                el.className = 'api-status error';
                text.textContent = 'Нет связи';
            }
        }

        // === Date Picker ===
        function initDatePicker() {
            const today = new Date();
            const startOfYear = new Date(today.getFullYear(), 0, 1);
            datePicker = flatpickr('#date-range', {
                mode: 'range',
                dateFormat: 'd.m.Y',
                locale: 'ru',
                maxDate: '2026-12-31',
                defaultDate: [startOfYear, today]
            });
        }

        function getPickerDates() {
            if (!datePicker || !datePicker.selectedDates || datePicker.selectedDates.length < 2) return null;
            const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            return { from: fmt(datePicker.selectedDates[0]), to: fmt(datePicker.selectedDates[1]) };
        }

        function initRfmDatePicker() {
            const today = new Date();
            const startOfYear = new Date(today.getFullYear(), 0, 1);
            rfmDatePicker = flatpickr('#rfm-date-range', {
                mode: 'range',
                dateFormat: 'd.m.Y',
                locale: 'ru',
                maxDate: '2026-12-31',
                defaultDate: [startOfYear, today],
                onChange: function(selectedDates, dateStr, instance) {
                    console.log('[RFM DatePicker] Selected:', dateStr);
                }
            });
            console.log('[RFM] Date picker initialized, default dates:', startOfYear, today);
        }

        function getRfmPickerDates() {
            if (!rfmDatePicker || !rfmDatePicker.selectedDates || rfmDatePicker.selectedDates.length < 2) {
                showError('Выберите период для RFM-анализа');
                return null;
            }
            const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            return { from: fmt(rfmDatePicker.selectedDates[0]), to: fmt(rfmDatePicker.selectedDates[1]) };
        }

        // === Mode Switcher ===
        let currentMode = 'discounts';
        let rfmDatePicker = null;
        let rfmAllData = null;

        function switchMode(mode) {
            console.log('[Mode] switchMode called with:', mode);
            currentMode = mode;

            // Update buttons
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });

            // Show/hide controls
            const discountControls = document.getElementById('discount-controls');
            const rfmControls = document.getElementById('rfm-controls');
            const rfmFilters = document.getElementById('rfm-filters');
            const discountResults = document.getElementById('discount-results');
            const rfmResults = document.getElementById('rfm-results');

            if (discountControls) discountControls.classList.toggle('hidden', mode !== 'discounts');
            if (rfmControls) rfmControls.classList.toggle('hidden', mode !== 'rfm');
            if (rfmFilters) rfmFilters.classList.toggle('hidden', true);
            if (discountResults) {
                discountResults.classList.toggle('hidden', mode !== 'discounts');
                discountResults.classList.toggle('active', mode === 'discounts');
            }
            if (rfmResults) {
                rfmResults.classList.toggle('hidden', mode !== 'rfm');
                rfmResults.classList.toggle('active', mode === 'rfm');
            }

            // Hide error message when switching
            const errorEl = document.getElementById('error-message');
            if (errorEl) errorEl.classList.remove('active');

            // Update URL
            const url = new URL(window.location);
            url.searchParams.set('mode', mode);
            window.history.pushState({}, '', url);

            console.log('[Mode] URL updated, mode:', mode);

            // Initialize RFM date picker on first switch
            if (mode === 'rfm' && !rfmDatePicker) {
                console.log('[Mode] Initializing RFM date picker');
                initRfmDatePicker();
            }
        }

        // === Init ===
        document.addEventListener('DOMContentLoaded', function() {
            console.log('[Init] DOMContentLoaded');
            try {
                window.dashboardCheckApi();
                setInterval(window.dashboardCheckApi, 60000);
                initDatePicker();
                console.log('[Init] DatePicker initialized');
                loadDiscountNames();
                console.log('[Init] Discount names loading started');

                // Initialize mode from URL
                const urlParams = new URLSearchParams(window.location.search);
                const initialMode = urlParams.get('mode') || 'discounts';
                console.log('[Init] Initial mode:', initialMode);
                if (initialMode === 'rfm') {
                    switchMode('rfm');
                }
            } catch (e) {
                console.error('[Init] Error during initialization:', e);
            }
        });

        // === Load discount names on page open (light query) ===
        async function loadDiscountNames() {
            const sel = document.getElementById('discount-select');
            try {
                const r = await fetch('/api/discount-names');
                const d = await r.json();
                const names = d.names || [];
                sel.innerHTML = '<option value="">Все скидки</option>';
                names.forEach(name => {
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.textContent = name;
                    sel.appendChild(opt);
                });
            } catch {
                sel.innerHTML = '<option value="">Не удалось загрузить</option>';
            }
        }

        // === Load Data (main analysis) ===
        async function loadData() {
            const bar = document.getElementById('bar-select').value;
            const dates = getPickerDates();
            const discountName = document.getElementById('discount-select').value;
            if (!dates) { showError('Выберите период'); return; }

            document.getElementById('loading').classList.add('active');
            document.getElementById('discount-results').innerHTML = '';
            document.getElementById('error-message').classList.remove('active');
            document.getElementById('btn-load').disabled = true;

            try {
                const response = await fetch('/api/discount-analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bar: bar || null, date_from: dates.from, date_to: dates.to })
                });
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || 'Ошибка при получении данных');
                }
                allData = await response.json();

                // Показываем результат режима Скидки
                if (bar) {
                    // Конкретный бар — таблица гостей
                    displayDiscountResults(discountName, bar);
                } else {
                    // Все бары — сводка по барам
                    displayStoresSummary(discountName);
                }
            } catch (error) {
                showError(error.message);
            } finally {
                document.getElementById('loading').classList.remove('active');
                document.getElementById('btn-load').disabled = false;
            }
        }

        // === Load RFM Data ===
        async function loadRfmData() {
            console.log('[RFM] loadRfmData called');
            console.log('[RFM] rfmDatePicker:', rfmDatePicker);
            console.log('[RFM] selectedDates:', rfmDatePicker?.selectedDates);

            const bar = document.getElementById('rfm-bar-select').value;
            const dates = getRfmPickerDates();
            if (!dates) {
                console.log('[RFM] No dates selected');
                return;
            }
            console.log('[RFM] Dates:', dates);

            document.getElementById('loading').classList.add('active');
            document.getElementById('rfm-results').innerHTML = '';
            document.getElementById('error-message').classList.remove('active');
            document.getElementById('btn-rfm-load').disabled = true;

            try {
                const response = await fetch('/api/rfm-analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bar: bar || null, date_from: dates.from, date_to: dates.to })
                });
                console.log('[RFM] Response status:', response.status);
                if (!response.ok) {
                    const err = await response.json();
                    console.error('[RFM] Server error:', err);
                    throw new Error(err.error || 'Ошибка при получении данных');
                }
                rfmAllData = await response.json();
                console.log('[RFM] Data received:', rfmAllData);
                console.log('[RFM] Guests count:', rfmAllData.guests?.length);
                console.log('[RFM] Segments:', rfmAllData.segments);

                // Показываем результат режима RFM
                displayRfmResults(rfmAllData);

                // Сбрасываем выделенный сегмент
                rfmSelectedSegment = 'all';
            } catch (error) {
                console.error('[RFM] Error:', error);
                showError(error.message);
            } finally {
                document.getElementById('loading').classList.remove('active');
                document.getElementById('btn-rfm-load').disabled = false;
            }
        }

        // === RFM Filters ===
        let currentFilterSegment = 'all';
        let currentFilterRecency = 'all';
        let currentFilterFrequency = 'all';

        function applyFilters() {
            currentFilterSegment = document.getElementById('segment-filter').value;
            currentFilterRecency = document.getElementById('recency-filter').value;
            currentFilterFrequency = document.getElementById('frequency-filter').value;

            const discountName = document.getElementById('discount-select').value;

            // Применяем фильтры только к RFM-сегментации
            displayRfmSegmentation(discountName);
        }

        function clearFilters() {
            document.getElementById('segment-filter').value = 'all';
            document.getElementById('recency-filter').value = 'all';
            document.getElementById('frequency-filter').value = 'all';
            currentFilterSegment = 'all';
            currentFilterRecency = 'all';
            currentFilterFrequency = 'all';
            applyFilters();
        }

        function matchesFilters(guest) {
            // Segment filter
            if (currentFilterSegment !== 'all') {
                const seg = getCombinedSegment(guest);
                if (seg.name !== currentFilterSegment) return false;
            }

            // Recency filter
            if (currentFilterRecency !== 'all' && guest.recency_days !== null) {
                const [min, max] = currentFilterRecency.replace('+', '').split('-').map(v => v === '60' ? Infinity : parseInt(v));
                if (guest.recency_days < min || guest.recency_days > max) return false;
            }

            // Frequency filter
            if (currentFilterFrequency !== 'all' && guest.frequency_per_week !== null) {
                const freqRanges = {
                    '3+': [3, Infinity],
                    '2-3': [2, 3],
                    '1-2': [1, 2],
                    '0-1': [0, 1]
                };
                const [min, max] = freqRanges[currentFilterFrequency];
                if (guest.frequency_per_week < min || guest.frequency_per_week > max) return false;
            }

            return true;
        }

        // === Helpers: merge stores/guests across discounts ===
        function getStores(discountName) {
            if (discountName) return allData.stores_summary[discountName] || [];
            // Merge all discounts by store
            const merged = {};
            for (const stores of Object.values(allData.stores_summary)) {
                for (const st of stores) {
                    if (!merged[st.store]) {
                        merged[st.store] = { store: st.store, orders_count: 0, guests_count: 0, sum_with_discount: 0, discount_sum: 0 };
                    }
                    merged[st.store].orders_count += st.orders_count;
                    merged[st.store].guests_count += st.guests_count;
                    merged[st.store].sum_with_discount += st.sum_with_discount;
                    merged[st.store].discount_sum += st.discount_sum;
                }
            }
            return Object.values(merged).sort((a, b) => b.discount_sum - a.discount_sum);
        }

        function getGuests(discountName) {
            if (discountName) return allData.discounts[discountName] || [];
            // Merge all discounts by card_number
            const merged = {};
            for (const guests of Object.values(allData.discounts)) {
                for (const g of guests) {
                    const key = g.card_number;
                    if (!merged[key]) {
                        merged[key] = { ...g, dishes: [...g.dishes], stores: [...g.stores], visit_dates: [...(g.visit_dates || [])] };
                    } else {
                        merged[key].visits += g.visits;
                        merged[key].sum_with_discount += g.sum_with_discount;
                        merged[key].discount_sum += g.discount_sum;
                        merged[key].dishes = merged[key].dishes.concat(g.dishes);
                        merged[key].stores = [...new Set([...merged[key].stores, ...g.stores])];
                        if (g.visit_dates) merged[key].visit_dates = [...new Set([...merged[key].visit_dates, ...g.visit_dates])];
                        // При мерже сохраняем последний визит
                        if (g.last_visit && (!merged[key].last_visit || g.last_visit > merged[key].last_visit)) {
                            merged[key].last_visit = g.last_visit;
                        }
                        if (g.first_visit && (!merged[key].first_visit || g.first_visit < merged[key].first_visit)) {
                            merged[key].first_visit = g.first_visit;
                        }
                        // Recency: минимальный из recency_days
                        if (g.recency_days !== null && (merged[key].recency_days === null || g.recency_days < merged[key].recency_days)) {
                            merged[key].recency_days = g.recency_days;
                        }
                        // Frequency: пересчитываем
                        merged[key].frequency_per_week = merged[key].visits / 180 * 7; // за 6 месяцев
                    }
                }
            }
            // Сортировка по recency (сначала самые "свежие")
            return Object.values(merged).sort((a, b) => (a.recency_days || 999) - (b.recency_days || 999));
        }

        // === Display: Сводка по барам (Все бары) ===
        function displayStoresSummary(discountName) {
            const resultsDiv = document.getElementById('discount-results');
            if (!resultsDiv) return;
            resultsDiv.innerHTML = '';

            const stores = getStores(discountName);
            const totalOrders = stores.reduce((s, st) => s + st.orders_count, 0);
            const totalGuests = stores.reduce((s, st) => s + st.guests_count, 0);
            const totalSumWith = stores.reduce((s, st) => s + st.sum_with_discount, 0);
            const totalDiscount = stores.reduce((s, st) => s + st.discount_sum, 0);
            const totalBase = totalSumWith + totalDiscount;
            const depth = totalBase > 0 ? (totalDiscount / totalBase * 100).toFixed(1) : '0';
            const avgCheck = totalOrders > 0 ? Math.round(totalSumWith / totalOrders) : 0;
            const title = discountName ? esc(discountName) : 'Все скидки';

            resultsDiv.innerHTML = `
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-name">Выручка (без скидки)</div>
                        <div class="metric-value">${fmtMoney(totalBase)}</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-name">Выручка (со скидкой)</div>
                        <div class="metric-value">${fmtMoney(totalSumWith)}</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-name">Отдали скидками</div>
                        <div class="metric-value">${fmtMoney(totalDiscount)}</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-name">Глубина скидки</div>
                        <div class="metric-value">${depth}<span class="metric-unit">%</span></div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-name">Средний чек</div>
                        <div class="metric-value">${fmtMoney(avgCheck)}</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-name">Чеков</div>
                        <div class="metric-value">${fmtNum(totalOrders)}</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-name">Гостей</div>
                        <div class="metric-value">${fmtNum(totalGuests)}</div>
                    </div>
                </div>

                <div class="table-card">
                    <h3 class="section-title">Сводка по барам — ${title}</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Бар</th>
                                <th>Чеков</th>
                                <th>Гостей</th>
                                <th>Без скидки</th>
                                <th>Выручка</th>
                                <th>Скидка</th>
                                <th>Глубина</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${stores.map(st => {
                                const stBase = st.sum_with_discount + st.discount_sum;
                                const stDepth = stBase > 0 ? (st.discount_sum / stBase * 100).toFixed(1) : '0';
                                return `
                                <tr class="clickable-row" onclick="switchToBar('${st.store.replace(/'/g, "\\'")}')">
                                    <td><strong>${esc(st.store)}</strong></td>
                                    <td>${fmtNum(st.orders_count)}</td>
                                    <td>${fmtNum(st.guests_count)}</td>
                                    <td>${fmtMoney(stBase)}</td>
                                    <td>${fmtMoney(st.sum_with_discount)}</td>
                                    <td>${fmtMoney(st.discount_sum)}</td>
                                    <td><strong>${stDepth}%</strong></td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>

                ${renderSegmentation(getGuests(discountName))}
            `;

            resultsDiv.classList.add('active');
            initSegmentChart(getGuests(discountName));
        }

        // Switch to specific bar from stores table
        function switchToBar(barName) {
            document.getElementById('bar-select').value = barName;
            loadData();
        }

        // === Segmentation helpers ===
        const SEGMENTS = [
            { name: 'Новички', desc: '1 визит', min: 1, max: 1, cssClass: 'new' },
            { name: 'Возвращающиеся', desc: '2–3 визита', min: 2, max: 3, cssClass: 'returning' },
            { name: 'Постоянные', desc: '4+ визитов', min: 4, max: Infinity, cssClass: 'regular' }
        ];

        function segmentGuests(guests) {
            return SEGMENTS.map(seg => {
                const group = guests.filter(g => g.visits >= seg.min && g.visits <= seg.max);
                const revenue = group.reduce((s, g) => s + g.sum_with_discount, 0);
                const discount = group.reduce((s, g) => s + g.discount_sum, 0);
                const avgCheck = group.length > 0
                    ? Math.round(revenue / group.reduce((s, g) => s + g.visits, 0))
                    : 0;
                return { ...seg, count: group.length, revenue, discount, avgCheck };
            });
        }

        let segmentChart = null;
        let recencyChart = null;

        function renderRecencyHistogram(guests) {
            const buckets = [
                { label: '0-7 дн.', count: 0 },
                { label: '8-14 дн.', count: 0 },
                { label: '15-30 дн.', count: 0 },
                { label: '31-60 дн.', count: 0 },
                { label: '60+ дн.', count: 0 }
            ];

            guests.forEach(g => {
                if (g.recency_days === null) return;
                if (g.recency_days <= 7) buckets[0].count++;
                else if (g.recency_days <= 14) buckets[1].count++;
                else if (g.recency_days <= 30) buckets[2].count++;
                else if (g.recency_days <= 60) buckets[3].count++;
                else buckets[4].count++;
            });

            const total = guests.filter(g => g.recency_days !== null).length || 1;

            return `
                <h3 class="section-title">Распределение по recency</h3>
                <div class="segmentation-section" style="grid-template-columns: 1fr;">
                    <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                        ${buckets.map(b => `
                            <div style="flex: 1; min-width: 100px; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--border-radius); padding: 16px; text-align: center; transition: all 0.15s ease;">
                                <div style="font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;">${b.label}</div>
                                <div style="font-size: 1.5rem; font-weight: 700; color: var(--text-primary); line-height: 1;">${b.count}</div>
                                <div style="font-size: 0.75rem; color: var(--text-tertiary); margin-top: 4px;">${(b.count / total * 100).toFixed(0)}%</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderSegmentation(guests) {
            const segments = segmentGuests(guests);
            const total = guests.length || 1;

            return `
                <h3 class="section-title">Сегментация по визитам</h3>
                <div class="segmentation-section">
                    <div class="chart-container">
                        <canvas id="segment-chart"></canvas>
                    </div>
                    <div class="segment-cards">
                        ${segments.map(seg => `
                            <div class="segment-card">
                                <div class="segment-indicator ${seg.cssClass}"></div>
                                <div class="segment-info">
                                    <div class="segment-name">${seg.name}</div>
                                    <div class="segment-desc">${seg.desc} — ${seg.count} чел. (${(seg.count / total * 100).toFixed(0)}%)</div>
                                </div>
                                <div class="segment-stats">
                                    <div class="segment-stat">
                                        <span class="label">Выручка</span>
                                        <span class="value">${fmtMoney(seg.revenue)}</span>
                                    </div>
                                    <div class="segment-stat">
                                        <span class="label">Ср. чек</span>
                                        <span class="value">${fmtMoney(seg.avgCheck)}</span>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                ${renderRecencyHistogram(guests)}
            `;
        }

        function initSegmentChart(guests) {
            const segments = segmentGuests(guests);
            const ctx = document.getElementById('segment-chart');
            if (!ctx) return;

            if (segmentChart) { segmentChart.destroy(); segmentChart = null; }

            // Карта цветов для сегментов (согласована с CSS)
            const segmentColorMap = {
                'Новички': '#6366f1',
                'Возвращающиеся': '#f59e0b',
                'Постоянные': '#10b981'
            };

            const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text-primary').trim();

            segmentChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: segments.map(s => s.name),
                    datasets: [{
                        data: segments.map(s => s.count),
                        backgroundColor: segments.map(s => segmentColorMap[s.name] || '#6b7280'),
                        borderWidth: 0,
                        hoverOffset: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    cutout: '55%',
                    plugins: {

                                    return `${seg.name}: ${seg.count} чел. (${(seg.count / (guests.length || 1) * 100).toFixed(0)}%)`;
                                }
                            }
                        }

        // === RFM Segmentation Helpers ===
        const RFM_SEGMENTS = {
            recency: [
                { code: 'R5', name: 'Активные', min: 0, max: 7 },
                { code: 'R4', name: 'Recent', min: 8, max: 14 },
                { code: 'R3', name: 'Средний риск', min: 15, max: 30 },
                { code: 'R2', name: 'Высокий риск', min: 31, max: 60 },
                { code: 'R1', name: 'Ушедшие', min: 61, max: Infinity }
            ],
            frequency: [
                { code: 'F5', name: 'VIP', min: 3, max: Infinity },
                { code: 'F4', name: 'Лояльные', min: 2, max: 3 },
                { code: 'F3', name: 'Регулярные', min: 0.8, max: 2 },
                { code: 'F2', name: 'Редкие', min: 0.3, max: 0.8 },
                { code: 'F1', name: 'Очень редкие', min: 0, max: 0.3 }
            ]
        };

        function getRecencySegment(recencyDays) {
            if (recencyDays === null || recencyDays === undefined) return RFM_SEGMENTS.recency[3];
            return RFM_SEGMENTS.recency.find(s => recencyDays >= s.min && recencyDays <= s.max) || RFM_SEGMENTS.recency[4];
        }

        function getFrequencySegment(freqPerWeek) {
            if (freqPerWeek === null || freqPerWeek === undefined) return RFM_SEGMENTS.frequency[4];
            return RFM_SEGMENTS.frequency.find(s => freqPerWeek >= s.min && freqPerWeek <= s.max) || RFM_SEGMENTS.frequency[4];
        }

        function getCombinedSegment(guest) {
            const r = getRecencySegment(guest.recency_days);
            const f = getFrequencySegment(guest.frequency_per_week);

            // Определяем комбинированный сегмент
            if (r.code === 'R5' && (f.code === 'F4' || f.code === 'F5')) return { name: 'CHAMPIONS', desc: 'Чемпионы' };
            if (r.code === 'R1' && (f.code === 'F3' || f.code === 'F4' || f.code === 'F5')) return { name: 'CHURNED', desc: 'Ушедшие' };
            if ((r.code === 'R2' || r.code === 'R3') && (f.code === 'F3' || f.code === 'F4' || f.code === 'F5')) return { name: 'AT_RISK', desc: 'В риске' };
            if (r.code === 'R5' && guest.visits === 1) return { name: 'NEW', desc: 'Новички' };
            if (r.code === 'R4' || r.code === 'R5') return { name: 'LOYAL', desc: 'Лояльные' };
            if (f.code === 'F1' || f.code === 'F2') return { name: 'POTENTIAL', desc: 'Потенциальные' };
            return { name: 'REGULAR', desc: 'Обычные' };
        }

        function formatLastVisit(lastVisit, recencyDays) {
            if (!lastVisit) return '—';
            const date = new Date(lastVisit);
            const day = date.getDate();
            const month = date.toLocaleString('ru', { month: 'short' });
            const monthNum = date.getMonth() + 1;
            const year = date.getFullYear();
            const isCurrentYear = year === new Date().getFullYear();
            const dateStr = isCurrentYear ? `${day} ${month}` : `${day}.${String(monthNum).padStart(2,'0')}.${year}`;
            const daysAgo = recencyDays !== null ? `(${recencyDays} дн. назад)` : '';
            return `${dateStr} ${daysAgo}`;
        }

        function getStatusBadge(segment) {
            const badges = {
                'CHAMPIONS': 'Чемпион',
                'CHURNED': 'Ушел',
                'AT_RISK': 'В риске',
                'NEW': 'Новичок',
                'LOYAL': 'Лояльный',
                'POTENTIAL': 'Потенциальный',
                'REGULAR': '• Обычный'
            };
            return badges[segment.name] || segment.name;
        }

        // === RFM Scatter Plot ===
        let rfmScatterChart = null;

        function initRfmScatterChart(guests) {
            const ctx = document.getElementById('rfm-scatter-chart');
            if (!ctx) return;

            if (rfmScatterChart) { rfmScatterChart.destroy(); rfmScatterChart = null; }

            // Карта цветов для сегментов (согласована с CSS)
            const segmentColorMap = {
                'CHAMPIONS': '#10b981',
                'LOYAL': '#3b82f6',
                'AT_RISK': '#f97316',
                'CHURNED': '#ef4444',
                'NEW': '#8b5cf6',
                'POTENTIAL': '#06b6d4',
                'REGULAR': '#6b7280'
            };

            // Подготавливаем данные
            const datasets = [];
            const segmentColors = {};

            guests.forEach(g => {
                if (g.recency_days === null || g.frequency_per_week === null) return;

                const segment = getCombinedSegment(g);
                const segmentColor = segmentColorMap[segment.name] || '#6b7280';
                if (!segmentColors[segment.name]) {
                    segmentColors[segment.name] = segmentColor;
                    datasets.push({
                        label: segment.desc,
                        data: [],
                        backgroundColor: segmentColor,
                        borderColor: segmentColor,
                        pointRadius: 6
                    });
                }

                // Размер точки на основе среднего чека (нормализуем)
                const maxAvgCheck = Math.max(...guests.map(x => x.avg_check || 0));
                const normalizedSize = maxAvgCheck > 0 ? (g.avg_check / maxAvgCheck) * 8 + 4 : 6;

                datasets.find(d => d.label === segment.desc).data.push({
                    x: g.frequency_per_week,
                    y: g.recency_days,
                    r: normalizedSize / 2,
                    guest: g
                });
            });

            const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text-primary').trim();

            rfmScatterChart = new Chart(ctx, {
                type: 'bubble',
                data: { datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            type: 'linear',
                            min: 0,
                            title: {
                                display: true,
                                text: 'Частота (визитов в неделю)',
                                color: textColor,
                                font: { weight: 'bold' }
                            },
                            ticks: { color: textColor }
                        },
                        y: {
                            reverse: true, // Меньше recency = лучше
                            title: {
                                display: true,
                                text: 'Recency (дней с последнего визита)',
                                color: textColor,
                                font: { weight: 'bold' }
                            },
                            ticks: { color: textColor }
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: textColor }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const point = context.raw;
                                    const g = point.guest;
                                    return `${g.customer_name || g.card_number}: ${g.frequency_per_week} виз./нед, ${g.recency_days} дн., ${fmtMoney(g.avg_check)}`;
                                }
                            }
                        }
                    },
                    onClick: (e, elements) => {
                        if (elements.length > 0) {
                            const datasetIndex = elements[0].datasetIndex;
                            const index = elements[0].index;
                            const guest = datasets[datasetIndex].data[index].guest;
                            showGuestDetails(guest);
                        }
                    }
                }
            });
        }

        // === Export to CSV ===
        function exportGuestsToCSV(title) {
            const guests = getGuests(document.getElementById('discount-select').value);
            const filteredGuests = guests.filter(g => matchesFilters(g));

            if (filteredGuests.length === 0) {
                alert('Нет данных для экспорта');
                return;
            }

            const headers = ['Гость', 'Карта', 'Последний визит', 'Recency (дн)', 'Частота (раз/нед)', 'Визитов', 'Средний чек', 'Выручка', 'Скидка', 'Сегмент'];
            const rows = filteredGuests.map(g => {
                const segment = getCombinedSegment(g);
                return [
                    g.customer_name || '',
                    g.card_number,
                    g.last_visit || '',
                    g.recency_days || '',
                    g.frequency_per_week || '',
                    g.visits,
                    g.avg_check || '',
                    g.sum_with_discount,
                    g.discount_sum,
                    segment.name
                ].map(v => `"${v}"`).join(',');
            });

            const csv = [headers.join(','), ...rows].join('\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `guests_${title.replace(/\s+/g, '_')}_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }
