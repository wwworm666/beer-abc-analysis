        }

        let rfmFilteredGuests = [];
        let rfmSelectedSegment = 'all';

        function selectRfmSegment(segmentKey) {
            rfmSelectedSegment = segmentKey;

            // Обновляем активный класс на карточках
            document.querySelectorAll('.segment-card').forEach(card => {
                card.classList.toggle('active', card.dataset.segment === segmentKey);
            });

            // Обновляем селект в таблице
            const selectEl = document.getElementById('rfm-segment-filter');
            if (selectEl) {
                selectEl.value = segmentKey;
            }

            // Применяем фильтры
            applyRfmFilters();
        }

        function applyRfmFilters() {
            const segmentFilterEl = document.getElementById('rfm-segment-filter');
            if (!segmentFilterEl) return;

            const segmentFilter = segmentFilterEl.value;
            const guests = rfmAllData.guests || [];

            rfmFilteredGuests = segmentFilter === 'all'
                ? guests
                : guests.filter(g => {
                    const seg = getCombinedSegment(g);
                    return seg.name === segmentFilter;
                });

            const tbody = document.getElementById('rfm-guests-tbody');
            if (tbody) {
                tbody.innerHTML = renderRfmGuestRows(rfmFilteredGuests);
            }

            // Обновляем активный класс на карточках
            document.querySelectorAll('.segment-card').forEach(card => {
                card.classList.toggle('active', card.dataset.segment === segmentFilter);
            });
        }

        function renderRfmGuestRows(guests) {
            return guests.map((g, i) => {
                const segment = getCombinedSegment(g);
                const recencyDisplay = g.recency_days !== null ? `${g.recency_days} дн.` : '—';
                const freqDisplay = g.frequency_per_week !== null ? `${g.frequency_per_week.toFixed(1)}` : '—';
                const badgeClass = 'segment-badge ' + segment.name.toLowerCase();
                const statusText = getStatusBadge(segment);
                return `
                    <tr class="clickable-row" onclick='showGuestDetails(${JSON.stringify(g).replace(/'/g, "&#39;")})'>
                        <td><span class="${badgeClass}">${statusText}</span></td>
                        <td>${esc(g.customer_name || 'Без имени')}</td>
                        <td>${esc(g.card_number)}</td>
                        <td>${formatLastVisit(g.last_visit, g.recency_days)}</td>
                        <td>${recencyDisplay}</td>
                        <td><strong>${freqDisplay}</strong></td>
                        <td>${g.visits}</td>
                        <td>${fmtMoney(g.avg_check)}</td>
                        <td>${fmtMoney(g.sum_with_discount)}</td>
                    </tr>
                `;
            }).join('');
        }

        function renderRecencyHistogram(guests) {
            const buckets = [
                { label: '0-7 дн.', count: 0 },
                { label: '8-14 дн.', count: 0 },
                { label: '15-30 дн.', count: 0 },
                { label: '31-60 дн.', count: 0 },
                { label: '60+ дн.', count: 0 }
            ];

            guests.forEach(g => {
                if (g.recency_days === null) return;
                if (g.recency_days <= 7) buckets[0].count++;
                else if (g.recency_days <= 14) buckets[1].count++;
                else if (g.recency_days <= 30) buckets[2].count++;
                else if (g.recency_days <= 60) buckets[3].count++;
                else buckets[4].count++;
            });

            const total = guests.filter(g => g.recency_days !== null).length || 1;

            return `
                <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                    ${buckets.map(b => `
                        <div style="flex: 1; min-width: 100px; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--border-radius); padding: 16px; text-align: center; transition: all 0.15s ease;">
                            <div style="font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;">${b.label}</div>
                            <div style="font-size: 1.5rem; font-weight: 700; color: var(--text-primary); line-height: 1;">${b.count}</div>
                            <div style="font-size: 0.75rem; color: var(--text-tertiary); margin-top: 4px;">${(b.count / total * 100).toFixed(0)}%</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderSegmentDetails(guests, segments) {
            const segmentDescriptions = {
                'CHAMPIONS': 'Ходят часто и недавно',
                'LOYAL': 'Стабильные гости',
                'AT_RISK': 'Раньше ходили часто, сейчас реже',
                'CHURNED': 'Не ходят 60+ дней',
                'NEW': 'Первый визит <7 дней назад',
                'POTENTIAL': 'Редкие, но свежие'
            };

            return `
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;">
                    ${Object.keys(segments).map(key => `
                        <div style="background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--border-radius); padding: 20px; transition: all 0.15s ease;">
                            <div style="font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;">${key}</div>
                            <div style="font-size: 0.75rem; color: var(--text-tertiary); margin-bottom: 16px; line-height: 1.5;">${segmentDescriptions[key]}</div>
                            <div style="display: flex; justify-content: space-between; align-items: baseline; padding-top: 16px; border-top: 1px solid var(--border-color);">
                                <div>
                                    <div style="font-size: 1.5rem; font-weight: 700; color: var(--text-primary); line-height: 1;">${segments[key].count}</div>
                                    <div style="font-size: 0.7rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em;">гостей</div>
                                </div>
                                <div style="text-align: right;">
                                    <div style="font-size: 0.9rem; font-weight: 600; color: var(--text-primary);">${segments[key].percent}%</div>
                                    <div style="font-size: 0.7rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em;">${fmtMoney(segments[key].revenue)}</div>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function switchRfmTab(tabName) {
            const tabBtns = document.querySelectorAll('.tab-btn');
            const tabContents = document.querySelectorAll('.tab-content');
            if (!tabBtns.length || !tabContents.length) return;

            tabBtns.forEach(btn => btn.classList.remove('active'));
            tabContents.forEach(content => content.classList.remove('active'));

            const activeBtn = document.querySelector(`[onclick="switchRfmTab('${tabName}')"]`);
            const activeContent = document.getElementById(`tab-${tabName}`);
            if (activeBtn) activeBtn.classList.add('active');
            if (activeContent) activeContent.classList.add('active');

            if (tabName === 'scatter') {
                setTimeout(() => initRfmScatterChart(rfmAllData.guests || []), 100);
            }
        }

        function exportRfmGuests() {
            const guests = rfmFilteredGuests.length > 0 ? rfmFilteredGuests : rfmAllData.guests || [];

            if (guests.length === 0) {
                alert('Нет данных для экспорта');
                return;
            }

            const headers = ['Гость', 'Карта', 'Последний визит', 'Recency (дн)', 'Частота (раз/нед)', 'Визитов', 'Средний чек', 'Выручка', 'Скидка', 'Сегмент'];
            const rows = guests.map(g => {
                const segment = getCombinedSegment(g);
                return [
                    g.customer_name || '',
                    g.card_number,
                    g.last_visit || '',
                    g.recency_days || '',
                    g.frequency_per_week || '',
                    g.visits,
                    g.avg_check || '',
                    g.sum_with_discount,
                    g.discount_sum,
                    segment.name
                ].map(v => `"${v}"`).join(',');
            });

            const csv = [headers.join(','), ...rows].join('\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `rfm_guests_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }

        // === Guest Details Modal ===
        function showGuestDetails(guest) {
            document.getElementById('modal-title').textContent = guest.customer_name || guest.card_number;
            const segment = getCombinedSegment(guest);
            const body = document.getElementById('modal-body');

            // Timeline визитов
            const visitDates = guest.visit_dates || [];
            const timelineHtml = visitDates.length > 0 ? `
                <h3 class="section-title">История визитов (${visitDates.length})</h3>
                <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px;">
                    ${visitDates.map(d => {
                        const date = new Date(d);
                        const day = date.getDate();
                        const month = date.toLocaleString('ru', { month: 'short' });
                        const weekday = date.toLocaleString('ru', { weekday: 'short' });
                        return `<span style="background: var(--bg-tertiary); padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; font-weight: 500;">${weekday}, ${day} ${month}</span>`;
                    }).join('')}
                </div>
            ` : '';

            // Паттерн посещения
            const patternText = guest.frequency_per_week !== null
                ? `${guest.frequency_per_week} визита(ов) в неделю`
                : 'Данных недостаточно';
            const recencyText = guest.recency_days !== null
                ? `${guest.recency_days} дн. назад`
                : 'Нет данных';

            body.innerHTML = `
                <div style="margin-bottom: 24px; padding: 16px; background: var(--bg-tertiary); border-radius: var(--border-radius); border-left: 4px solid ${segment.color};">
                    <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 4px;">Сегмент</div>
                    <div style="font-size: 1.1rem; font-weight: 700; color: ${segment.color};">${segment.desc} (${segment.name})</div>
                </div>

                <div class="detail-grid">
                    <div class="detail-item">
                        <div class="label">Карта</div>
                        <div class="value">${esc(guest.card_number)}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">Последний визит</div>
                        <div class="value">${formatLastVisit(guest.last_visit, guest.recency_days)}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">Частота</div>
                        <div class="value">${patternText}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">Всего визитов</div>
                        <div class="value">${guest.visits}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">Первый визит</div>
                        <div class="value">${guest.first_visit ? new Date(guest.first_visit).toLocaleDateString('ru', {day: 'numeric', month: 'long', year: 'numeric'}) : '—'}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">Активен</div>
                        <div class="value">${guest.active_days ? `${guest.active_days} дн.` : '—'}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">Средний чек</div>
                        <div class="value">${fmtMoney(guest.avg_check)}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">Выручка</div>
                        <div class="value">${fmtMoney(guest.sum_with_discount)}</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">Скидка</div>
                        <div class="value">${fmtMoney(guest.discount_sum)}</div>
                    </div>
                </div>

                ${timelineHtml}

                ${guest.dishes && guest.dishes.length > 0 ? `
                    <h3 class="section-title">Блюда со скидкой</h3>
                    <table>
                        <thead>
                            <tr><th>Блюдо</th><th>Дата</th><th>Чек</th><th>Точка</th><th>Со скидкой</th><th>Скидка</th></tr>
                        </thead>
                        <tbody>
                            ${guest.dishes.map(d => `
                                <tr>
                                    <td>${esc(d.name)}</td>
                                    <td>${d.date ? new Date(d.date).toLocaleDateString('ru', {day: 'numeric', month: 'short'}) : '—'}</td>
                                    <td>${esc(String(d.order_num))}</td>
                                    <td>${esc(d.store)}</td>
                                    <td>${fmtMoney(d.sum_with_discount)}</td>
                                    <td>${fmtMoney(d.discount_sum)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                ` : ''}
            `;
            document.getElementById('guest-modal').classList.add('active');
        }

        function closeModal() { document.getElementById('guest-modal').classList.remove('active'); }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        // === Helpers ===
        function fmtNum(n) { return new Intl.NumberFormat('ru-RU').format(Math.round(n)); }
        function fmtMoney(n) { return new Intl.NumberFormat('ru-RU').format(Math.round(n)) + ' \u20BD'; }
        function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
        function showError(msg) { const el = document.getElementById('error-message'); el.textContent = msg; el.classList.add('active'); }
    </script>
    <script src="/static/logo.js"></script>
</body>
</html>
