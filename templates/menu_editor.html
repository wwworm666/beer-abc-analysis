<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка — Редактор меню</title>
    <link rel="stylesheet" href="/static/dashboard/styles/fonts.css">
    <link rel="stylesheet" href="/static/dashboard/styles/variables.css">
    <link rel="stylesheet" href="/static/dashboard/styles/base.css">
    <link rel="stylesheet" href="/static/dashboard/styles/sidebar.css">
    <link rel="stylesheet" href="/static/dashboard/styles/mobile.css">
    <link rel="stylesheet" href="/static/logo.css">
    <link rel="stylesheet" href="/static/menu/ptserif.css">
    <link rel="stylesheet" href="/static/menu/menu_card.css">
    <style>
      .me-grid{ display: grid; grid-template-columns: 440px 1fr; gap: 20px; align-items: start;
        max-width: 1320px; margin: 0 auto; padding: 4px 4px 80px; }
      @media (max-width: 1080px){ .me-grid{ grid-template-columns: 1fr; } }

      .me-form{ background: var(--bg-secondary); border: 1px solid var(--border-color);
        border-radius: var(--border-radius-sm); overflow: hidden; }
      .me-top{ display: flex; align-items: center; gap: 10px; padding: 14px 18px;
        border-bottom: 1px solid var(--border-color); flex-wrap: wrap; }
      .me-back{ color: var(--text-secondary); text-decoration: none; font-size: 12px; font-weight: 600;
        display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border: 1px solid var(--border-color);
        border-radius: var(--border-radius-pill); }
      .me-back:hover{ color: var(--accent); border-color: var(--accent); }
      .me-meta{ font-size: 12px; color: var(--text-tertiary); }
      .me-meta b{ color: var(--text-secondary); }

      .me-sec{ padding: 16px 18px; border-bottom: 1px solid var(--border-light); }
      .me-sec:last-child{ border-bottom: none; }
      .me-sec h3{ font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.1em;
        color: var(--text-tertiary); margin: 0 0 12px; font-weight: 600; }
      .me-field{ margin-bottom: 11px; }
      .me-field:last-child{ margin-bottom: 0; }
      .me-field label{ display: block; font-size: 10.5px; color: var(--text-secondary);
        text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; font-weight: 600; }
      .me-in{ width: 100%; padding: 9px 12px; background: var(--bg-primary); color: var(--text-primary);
        border: 1px solid var(--border-color); border-radius: 10px; font-size: 14px; font-family: var(--font-family);
        transition: all var(--transition-fast); }
      .me-in:focus{ outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
      .me-row{ display: flex; gap: 10px; }
      .me-row > .me-field{ flex: 1; }

      .me-meter{ display: flex; align-items: center; gap: 14px; margin-bottom: 9px; }
      .me-meter .lbl{ width: 86px; font-size: 12px; color: var(--text-secondary); }
      .me-dots{ display: flex; gap: 7px; }
      .me-dot{ width: 19px; height: 19px; border-radius: 50%; border: 1px solid var(--text-tertiary);
        background: transparent; cursor: pointer; transition: all var(--transition-fast); padding: 0; }
      .me-dot.on{ background: var(--accent); border-color: var(--accent); }
      .me-dot:hover{ border-color: var(--accent); }

      .me-actions{ display: flex; gap: 8px; flex-wrap: wrap; }
      .m-btn{ border: 1px solid var(--accent); background: var(--accent); color: #fff;
        border-radius: var(--border-radius-pill); padding: 10px 16px; font-size: 13px; font-weight: 600;
        cursor: pointer; font-family: var(--font-family); white-space: nowrap; transition: all var(--transition-fast);
        text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
      .m-btn:hover{ background: var(--accent-hover); border-color: var(--accent-hover); transform: translateY(-1px); }
      .m-btn.sec{ background: var(--bg-secondary); color: var(--text-secondary); border-color: var(--border-color); }
      .m-btn.sec:hover{ background: var(--bg-tertiary); color: var(--text-primary); }
      .m-btn.danger{ background: transparent; color: var(--danger); border-color: var(--border-color); }
      .m-btn.danger:hover{ background: var(--danger-bg); border-color: var(--danger); transform: none; }
      .me-savestate{ font-size: 11px; color: var(--text-tertiary); align-self: center; }

      .me-preview{ position: sticky; top: 12px; background: var(--bg-tertiary);
        border: 1px solid var(--border-color); border-radius: var(--border-radius-sm);
        display: flex; align-items: flex-start; justify-content: center; overflow: hidden;
        min-height: 540px; padding: 24px; }
      .me-scaler{ transform-origin: top center; }
      .me-scaler .page{ box-shadow: var(--shadow-lg); }
      select.me-in{ appearance: auto; cursor: pointer; }
      .me-rec{ display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
      .me-rec .me-rec-hint{ width: 100%; font-size: 10.5px; color: var(--text-tertiary);
        text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
      .me-chip{ border: 1px dashed var(--border-color); background: var(--bg-primary);
        color: var(--text-secondary); border-radius: var(--border-radius-pill); padding: 5px 12px;
        font-size: 12px; cursor: pointer; font-family: var(--font-family); transition: all var(--transition-fast); }
      .me-chip:hover{ border-color: var(--accent); color: var(--accent); border-style: solid; }
      .me-chip.used{ opacity: 0.35; cursor: default; }
      .toast{ position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: var(--text-primary); color: var(--bg-secondary); padding: 12px 20px;
        border-radius: var(--border-radius-sm); font-size: 13px; box-shadow: var(--shadow-lg);
        z-index: 60; opacity: 0; transition: opacity var(--transition-base); pointer-events: none; }
      .toast.show{ opacity: 1; }
    </style>
</head>
<body>
<div class="container">
    {% set page_title = "Редактор меню" %}
    {% set page_subtitle = "карточка сорта" %}
    {% include 'shared/nav.html' %}

    <div class="me-grid">
      <!-- LEFT: form -->
      <div class="me-form">
        <div class="me-top">
          <a class="me-back" href="/menu">← К библиотеке</a>
          <span class="me-meta" id="meta"></span>
        </div>

        <div class="me-sec">
          <h3>Основное</h3>
          <div class="me-row">
            <div class="me-field" style="flex:0 0 84px;"><label>№</label><input class="me-in" id="f-n" type="number" min="1" oninput="paint()"></div>
            <div class="me-field" style="flex:0 0 110px;"><label>№ крана</label><input class="me-in" id="f-tap" type="number" min="1" placeholder="—" oninput="paint()"></div>
            <div class="me-field"><label>Название (RU, КАПС в шапке)</label><input class="me-in" id="f-name" oninput="paint()"></div>
          </div>
          <div class="me-field"><label>Латиница / оригинал</label><input class="me-in" id="f-latin" placeholder="Riegele Commerzienrat" oninput="paint()"></div>
          <div class="me-row">
            <div class="me-field"><label>Страна</label><input class="me-in" id="f-country" placeholder="Германия" oninput="paint()"></div>
            <div class="me-field"><label>Пивоварня</label><input class="me-in" id="f-brewery" placeholder="Riegele" oninput="paint()"></div>
          </div>
          <div class="me-row">
            <div class="me-field"><label>Стиль (BJCP)</label>
              <select class="me-in" id="f-style" onchange="onStyleChange()"></select>
              <input class="me-in" id="f-style-custom" placeholder="свой стиль (не из BJCP)" style="display:none; margin-top:6px;" oninput="paint()">
            </div>
            <div class="me-field" style="flex:0 0 120px;"><label>ABV, %</label><input class="me-in" id="f-abv" placeholder="5,2" oninput="paint()"></div>
          </div>
        </div>

        <div class="me-sec">
          <h3>Дескрипторы вкуса (3)</h3>
          <div class="me-row">
            <div class="me-field"><input class="me-in" id="f-tag1" placeholder="пусто" oninput="paint()"></div>
            <div class="me-field"><input class="me-in" id="f-tag2" placeholder="пусто" oninput="paint()"></div>
            <div class="me-field"><input class="me-in" id="f-tag3" placeholder="пусто" oninput="paint()"></div>
          </div>
          <div class="me-rec" id="rec-chips"></div>
        </div>

        <div class="me-sec">
          <h3>Шкалы (1–5)</h3>
          <div class="me-meter"><span class="lbl">горечь</span><div class="me-dots" data-key="gor"></div></div>
          <div class="me-meter"><span class="lbl">плотность</span><div class="me-dots" data-key="plot"></div></div>
          <div class="me-meter"><span class="lbl">цвет</span><div class="me-dots" data-key="cvet"></div></div>
        </div>

        <div class="me-sec">
          <h3>Цены (0,25 / 0,4 / 0,5)</h3>
          <div class="me-row">
            <div class="me-field"><label>0,25 л</label><input class="me-in" id="f-p025" type="number" min="0" oninput="paint()"></div>
            <div class="me-field"><label>0,4 л</label><input class="me-in" id="f-p04" type="number" min="0" oninput="paint()"></div>
            <div class="me-field"><label>0,5 л</label><input class="me-in" id="f-p05" type="number" min="0" oninput="paint()"></div>
          </div>
        </div>

        <div class="me-sec">
          <div class="me-actions">
            <button class="m-btn" onclick="save()" style="flex:1;">Сохранить</button>
            <button class="m-btn sec" onclick="exportPdf()" title="A4 PDF для печати">PDF</button>
            <button class="m-btn danger" id="btn-del" onclick="del()" style="display:none;">Удалить</button>
            <span class="me-savestate" id="savestate"></span>
          </div>
        </div>
      </div>

      <!-- RIGHT: live preview -->
      <div class="me-preview" id="preview">
        <div class="me-scaler mc-root" id="scaler"><article class="page" id="menu-card"></article></div>
      </div>
    </div>
</div>
<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const esc = s => (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const fmt = v => (v===null||v===undefined||v==="")?"—":String(v).replace(".",",");
const pad2 = n => String(n||0).padStart(2,"0");
const nameClass = n => { const l=(n||"").length; if(l>22)return"len-xl"; if(l>16)return"len-lg"; if(l>11)return"len-md"; return ""; };

let items = [], editingId = null, ratings = { gor:0, plot:0, cvet:0 };

function urlId(){ const n = parseInt(new URLSearchParams(location.search).get("id"),10); return Number.isFinite(n)?n:null; }
function setUrlId(id){ const u=new URL(location.href); if(id)u.searchParams.set("id",id); else u.searchParams.delete("id"); history.replaceState({},"",u.toString()); }

function getForm(){
  const num = id => { const v=$(id).value.trim(); return v===""?null:Number(v); };
  const tags = ["f-tag1","f-tag2","f-tag3"].map(id=>$(id).value.trim()).filter(Boolean);
  return {
    n: parseInt($("f-n").value,10)||0,
    tap: $("f-tap").value.trim()===""?null:(parseInt($("f-tap").value,10)||null),
    name: $("f-name").value.trim(), latin: $("f-latin").value.trim(),
    country: $("f-country").value.trim(), brewery: $("f-brewery").value.trim(),
    style: styleValue(), abv: $("f-abv").value.trim(),
    tags, ratings: {...ratings},
    p025: num("f-p025"), p04: num("f-p04"), p05: num("f-p05"),
  };
}

function renderDots(){
  document.querySelectorAll(".me-dots").forEach(box=>{
    const key = box.dataset.key, val = ratings[key]||0; box.innerHTML="";
    for(let i=1;i<=5;i++){ const d=document.createElement("button"); d.type="button";
      d.className="me-dot"+(i<=val?" on":""); d.onclick=()=>{ ratings[key]=(ratings[key]===i)?i-1:i; renderDots(); paint(); }; box.appendChild(d); }
  });
}

let STYLES = [], styleRec = {};
async function loadStyles(){
  try{ const r = await fetch("/menu/api/styles"); const d = await r.json(); STYLES = d.styles || []; }
  catch(e){ STYLES = []; }
  styleRec = {}; STYLES.forEach(s => { styleRec[s.name] = s.rec || []; });
  buildStyleSelect();
}
function buildStyleSelect(){
  const sel = $("f-style"); const cur = sel.value;
  sel.innerHTML = '<option value="">— выбери стиль —</option>';
  const ogc = document.createElement("optgroup"); ogc.label = "— свой —";
  const oc = document.createElement("option"); oc.value = "__custom__"; oc.textContent = "+ вписать свой стиль…";
  ogc.appendChild(oc); sel.appendChild(ogc);
  const groups = [], byG = {};
  STYLES.forEach(s => { if(!byG[s.group]){ byG[s.group]=[]; groups.push(s.group); } byG[s.group].push(s); });
  groups.forEach(g => {
    const og = document.createElement("optgroup"); og.label = g || "Прочее";
    byG[g].forEach(s => {
      const o = document.createElement("option"); o.value = s.name;
      o.textContent = s.code ? (s.name + " · " + s.code) : s.name;
      og.appendChild(o);
    });
    sel.appendChild(og);
  });
  if(cur){ ensureStyleOption(cur); sel.value = cur; }
}
function ensureStyleOption(name){
  if(!name) return; const sel = $("f-style");
  if([...sel.options].some(o => o.value === name)) return;
  const o = document.createElement("option"); o.value = name; o.textContent = name + " · свой"; sel.appendChild(o);
}
function styleValue(){
  const sel = $("f-style");
  return sel.value === "__custom__" ? $("f-style-custom").value.trim() : sel.value.trim();
}
function onStyleChange(){
  const custom = $("f-style-custom");
  if($("f-style").value === "__custom__"){ custom.style.display = ""; custom.focus(); }
  else { custom.style.display = "none"; custom.value = ""; }
  renderChips(); paint();
}
function renderChips(){
  const box = $("rec-chips"); const rec = styleRec[styleValue()] || [];
  if(!rec.length){ box.innerHTML = ""; return; }
  const cur = ["f-tag1","f-tag2","f-tag3"].map(id => $(id).value.trim());
  let h = '<span class="me-rec-hint">рекомендации стиля — клик вставит в пустое поле</span>';
  rec.forEach(w => { h += `<button type="button" class="me-chip${cur.includes(w)?" used":""}" onclick="addChip('${w}')">${esc(w)}</button>`; });
  box.innerHTML = h;
}
function addChip(word){
  const ids = ["f-tag1","f-tag2","f-tag3"];
  if(ids.some(id => $(id).value.trim() === word)) return;
  const empty = ids.find(id => $(id).value.trim() === "");
  if(!empty) return;
  $(empty).value = word; renderChips(); paint();
}

function cardInner(it){
  const trans = it.latin?`<div class="trans">[ ${esc(it.latin)} ]</div>`:"";
  const op=[]; if(it.country)op.push(`<span class="accent">${esc(it.country)}</span>`); if(it.brewery)op.push(esc(it.brewery));
  const tags=(it.tags||[]).filter(Boolean).map((t,i)=>`${i?'<span class="dot">·</span>':""}<span>${esc(t)}</span>`).join("");
  const r=it.ratings||{}; const num=it.tap||it.n||0;
  const dots=n=>{let h="";for(let i=1;i<=5;i++)h+=`<span class="d${i<=(n||0)?" on":""}"></span>`;return h;};
  return `<span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
    <header class="eyebrow"><span class="num">№ ${pad2(num)}</span></header>
    <section class="hero">${trans}<h1 class="name ${nameClass(it.name)}">${esc(it.name)}</h1><div class="origin">${op.join(" · ")}</div></section>
    <section class="facts"><span class="style">${esc(it.style)}</span><span class="abv">${esc(it.abv)}<span class="pct">%</span></span></section>
    <section class="tags">${tags}</section>
    <section class="meters">
      <div class="meter"><span class="k">горечь</span><div class="scale">${dots(r.gor)}</div></div>
      <div class="meter"><span class="k">плотность</span><div class="scale">${dots(r.plot)}</div></div>
      <div class="meter"><span class="k">цвет</span><div class="scale">${dots(r.cvet)}</div></div></section>
    <section class="prices">
      <div class="price"><span class="vol">0,25</span><span class="num">${fmt(it.p025)}</span></div>
      <div class="price"><span class="vol">0,4</span><span class="num">${fmt(it.p04)}</span></div>
      <div class="price"><span class="vol">0,5</span><span class="num">${fmt(it.p05)}</span></div></section>`;
}
function fitName(el){ if(!el)return; el.style.fontSize=""; let s=parseFloat(getComputedStyle(el).fontSize); while(el.scrollHeight>140&&s>36){s-=1;el.style.fontSize=s+"px";} }
function fitTags(el){ if(!el)return; el.style.fontSize=""; let s=parseFloat(getComputedStyle(el).fontSize); while(el.scrollWidth>el.clientWidth+1&&s>12){s-=1;el.style.fontSize=s+"px";} }
function fitTrans(el){ if(!el)return; el.style.fontSize=""; let s=parseFloat(getComputedStyle(el).fontSize); while(el.scrollWidth>el.clientWidth+1&&s>9){s-=1;el.style.fontSize=s+"px";} }
function fitStyle(el){ if(!el)return; el.style.fontSize=""; let s=parseFloat(getComputedStyle(el).fontSize); while(el.scrollWidth>el.clientWidth+1&&s>20){s-=1;el.style.fontSize=s+"px";} }

function fitPreview(){
  const sc=$("scaler"), area=$("preview"), card=$("menu-card");
  sc.style.transform=""; sc.style.width=""; sc.style.height="";
  const w=card.offsetWidth||794, h=card.offsetHeight||1123;
  const s=Math.min((area.clientWidth-48)/w, (area.clientHeight-48)/h, 0.62);
  sc.style.transform=`scale(${s})`; sc.style.width=w+"px"; sc.style.height=(h*s)+"px";
}
function paint(){
  const it=getForm(); const card=$("menu-card");
  card.innerHTML=cardInner(it); fitName(card.querySelector(".name")); fitTags(card.querySelector(".tags")); fitTrans(card.querySelector(".trans")); fitStyle(card.querySelector(".facts .style")); fitPreview();
}
window.addEventListener("resize", fitPreview);

function fill(it){
  $("f-n").value=it.n||""; $("f-tap").value=it.tap??""; $("f-name").value=it.name||"";
  $("f-latin").value=it.latin||""; $("f-country").value=it.country||""; $("f-brewery").value=it.brewery||"";
  $("f-style-custom").style.display="none"; $("f-style-custom").value="";
  ensureStyleOption(it.style||""); $("f-style").value=it.style||""; $("f-abv").value=it.abv||"";
  const t=it.tags||[]; $("f-tag1").value=t[0]||""; $("f-tag2").value=t[1]||""; $("f-tag3").value=t[2]||"";
  $("f-p025").value=it.p025??""; $("f-p04").value=it.p04??""; $("f-p05").value=it.p05??"";
  const r=it.ratings||{}; ratings={ gor:+r.gor||0, plot:+r.plot||0, cvet:+r.cvet||0 };
  renderDots(); renderChips(); paint();
}
function meta(){ const el=$("meta");
  if(editingId){ const it=items.find(i=>i.id===editingId); el.innerHTML=`Редактирование: <b>${esc(it?(it.name||("№ "+pad2(it.n))):("#"+editingId))}</b>`; }
  else el.innerHTML="Новая позиция (не сохранена)"; }

function newItem(){
  editingId=null; const used=new Set(items.map(i=>i.n||0)); let n=1; while(used.has(n))n++;
  fill({ n, tap:null, name:"", latin:"", country:"", brewery:"", style:"", abv:"", tags:[], ratings:{gor:0,plot:0,cvet:0}, p025:null, p04:null, p05:null });
  $("btn-del").style.display="none"; setUrlId(null); meta();
}

async function save(){
  const item=getForm();
  setState("saving");
  try{
    if(editingId){
      await fetch(`/menu/api/items/${editingId}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(item)});
    }else{
      const r=await fetch("/menu/api/items",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(item)});
      const c=await r.json(); editingId=c.id; setUrlId(editingId); $("btn-del").style.display="inline-flex";
    }
    const r=await fetch("/menu/api/items"); items=await r.json(); meta(); setState("saved");
  }catch(e){ setState("error"); toast("Ошибка сохранения: "+e.message); }
}
function setState(s){ $("savestate").textContent = s==="saving"?"сохранение…":s==="saved"?"сохранено":s==="error"?"ошибка":""; }

async function del(){
  if(!editingId) return; const it=items.find(i=>i.id===editingId);
  if(!confirm(`Удалить «${it?it.name:""}»?`)) return;
  await fetch(`/menu/api/items/${editingId}`,{method:"DELETE"}); location.href="/menu";
}
async function exportPdf(){
  const item=getForm();
  const res=await fetch("/menu/api/render-pdf",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(item)});
  if(!res.ok){ const e=await res.json().catch(()=>({})); toast("Ошибка PDF: "+(e.error||res.statusText)); return; }
  const blob=await res.blob(); const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download=`menu-${pad2(item.tap||item.n||0)}-${item.name||"card"}.pdf`; a.click(); URL.revokeObjectURL(a.href);
}

let toastTimer; function toast(m){ const t=$("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),4200); }

async function init(){
  renderDots();
  await loadStyles();
  const r=await fetch("/menu/api/items"); items=await r.json();
  const want=urlId(); const tgt=want?items.find(i=>i.id===want):null;
  if(tgt){ editingId=tgt.id; fill(tgt); $("btn-del").style.display="inline-flex"; meta(); }
  else newItem();
  if(document.fonts&&document.fonts.ready) document.fonts.ready.then(paint);
}
init();
</script>
</body>
</html>
