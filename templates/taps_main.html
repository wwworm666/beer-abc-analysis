<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Активность кранов</title>

    <!-- Shared CSS -->
    <link rel="stylesheet" href="/static/dashboard/styles/fonts.css">
    <link rel="stylesheet" href="/static/dashboard/styles/variables.css">
    <link rel="stylesheet" href="/static/dashboard/styles/base.css">
    <link rel="stylesheet" href="/static/dashboard/styles/sidebar.css">
    <link rel="stylesheet" href="/static/dashboard/styles/mobile.css">
    <link rel="stylesheet" href="/static/logo.css">

    <style>
        /* Bars Grid */
        .bars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .bar-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
        }

        .bar-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px var(--shadow);
            border-color: var(--accent);
        }

        .bar-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .bar-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .bar-taps {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .bar-status {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .status-item {
            text-align: center;
            padding: 8px;
        }

        .status-value {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .status-label {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .active-count {
            color: var(--success);
        }

        .empty-count {
            color: var(--text-tertiary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .bars-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .bar-card {
                padding: 24px;
            }

            .bar-name {
                font-size: 1.3rem;
            }

            .status-value {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        {% set page_title = "Активность кранов" %}
        {% set page_subtitle = "Мониторинг по барам" %}
        {% include 'shared/nav.html' %}

        <!-- Bars Grid -->
        <div class="bars-grid" id="bars-grid">
            <!-- Bars will be loaded here -->
        </div>
    </div>

    <script>
        const bars = [
            { id: 'bar1', name: 'Большой пр. В.О', taps: 24 },
            { id: 'bar2', name: 'Лиговский', taps: 12 },
            { id: 'bar3', name: 'Кременчугская', taps: 12 },
            { id: 'bar4', name: 'Варшавская', taps: 12 }
        ];

        // API Connection Status Check
        window.dashboardCheckApi = async function() {
            const statusElement = document.getElementById('api-status');
            if (!statusElement) return;
            const textElement = statusElement.querySelector('.api-status-text');

            statusElement.className = 'api-status checking';
            textElement.textContent = 'Проверка подключения...';

            try {
                const response = await fetch('/api/connection-status');
                const data = await response.json();

                if (response.ok && data.status === 'connected') {
                    statusElement.className = 'api-status connected';
                    textElement.textContent = 'iiko API подключен';
                } else {
                    statusElement.className = 'api-status error';
                    textElement.textContent = 'Ошибка подключения';
                    console.error('API connection error:', data.message);
                }
            } catch (error) {
                statusElement.className = 'api-status error';
                textElement.textContent = 'Ошибка подключения';
                console.error('API connection error:', error);
            }
        };

        // Check connection on page load
        document.addEventListener('DOMContentLoaded', function() {
            window.dashboardCheckApi();
            setInterval(window.dashboardCheckApi, 60000);
        });

        // Load bars status
        async function loadBarsStatus() {
            const grid = document.getElementById('bars-grid');
            grid.innerHTML = '';

            for (const bar of bars) {
                let active = 0;
                let empty = bar.taps;

                // Try to load stats from API
                let activity7d = 0;
                try {
                    const response = await fetch(`/api/taps/${bar.id}/stats`, { cache: 'no-store' });
                    if (response.ok) {
                        const data = await response.json();
                        active = data.active || 0;
                        empty = data.empty || bar.taps;
                        activity7d = data.activity_7d || 0;
                    }
                } catch (error) {
                    console.error(`Error loading stats for ${bar.id}:`, error);
                }

                const card = document.createElement('a');
                card.className = 'bar-card';
                card.href = `/taps/${bar.id}`;

                card.innerHTML = `
                    <div class="bar-name">${bar.name}</div>
                    <div class="bar-info">
                        <span class="bar-taps">Кранов: ${bar.taps}</span>
                    </div>
                    <div class="bar-status">
                        <div class="status-item">
                            <div class="status-value active-count">${active}</div>
                            <div class="status-label">Активных</div>
                        </div>
                        <div class="status-item">
                            <div class="status-value empty-count">${empty}</div>
                            <div class="status-label">Пустых</div>
                        </div>
                        <div class="status-item">
                            <div class="status-value">${Math.round((active / bar.taps) * 100)}%</div>
                            <div class="status-label">Загрузка</div>
                        </div>
                        <div class="status-item">
                            <div class="status-value">${activity7d.toFixed(1)}%</div>
                            <div class="status-label">Активность 7д</div>
                        </div>
                    </div>
                `;

                grid.appendChild(card);
            }
        }

        // Auto-refresh every 30 seconds
        setInterval(loadBarsStatus, 30000);

        // Initial load
        loadBarsStatus();
    </script>
    <script src="/static/logo.js"></script>
</body>
</html>
