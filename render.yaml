services:
  # Основной веб-сервис
  - type: web
    name: beer-abc-analysis
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: TELEGRAM_BOT_TOKEN
        sync: false

  # Торрент-бот — отдельный сервис, не трогает основной
  - type: web
    name: torrent-bot
    env: python
    buildCommand: pip install -r torrent_bot/requirements.txt
    startCommand: gunicorn torrent_bot.app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: TORRENT_BOT_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TRANSMISSION_HOST
        sync: false
      - key: TRANSMISSION_PORT
        sync: false
      - key: TRANSMISSION_USER
        sync: false
      - key: TRANSMISSION_PASS
        sync: false
      - key: RUTRACKER_USER
        sync: false
      - key: RUTRACKER_PASS
        sync: false
      - key: KINOZAL_USER
        sync: false
      - key: KINOZAL_PASS
        sync: false
      - key: ALLOWED_USERS
        sync: false
