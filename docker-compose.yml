services:
  app:
    build: .
    image: beer-abc-analysis:latest
    container_name: beer-app
    restart: unless-stopped
    env_file: .env
    network_mode: host
    extra_hosts:
      # Системный DNS отдаёт для api.telegram.org адрес 149.154.166.110,
      # который заблокирован на магистрали (ТСПУ) для датацентровых сетей;
      # 149.154.167.220 из того же пула доступен. Если Telegram перестанет
      # отвечать — проверить актуальность IP (docs/open-check-bot.md,
      # раздел "Блокировки").
      - "api.telegram.org:149.154.167.220"
    volumes:
      - /srv/kultura:/kultura
      - /srv/beer/data:/app/data
      - /srv/beer/chz_debug:/app/chz_test/debug
    # /app/logs не маунтим: gunicorn пишет access/error в stdout,
    # логи доступны через `docker compose logs app`. Маунт ломался
    # из-за случайно закоммиченного файла logs в репо (не папка).

  caddy:
    image: caddy:2-alpine
    container_name: beer-caddy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
