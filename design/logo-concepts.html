<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Kultura OS — Logo Concepts</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'IBM Plex Mono', monospace;
    background: #0a0a0a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
    gap: 80px;
  }

  h1 {
    font-size: 14px;
    font-weight: 400;
    color: #666;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .concepts {
    display: flex;
    flex-wrap: wrap;
    gap: 80px;
    justify-content: center;
    max-width: 1200px;
  }

  .concept {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
    padding: 50px;
    border: 1px solid #1a1a1a;
    border-radius: 16px;
    min-width: 340px;
    transition: border-color 0.3s;
  }
  .concept:hover { border-color: #333; }

  .label {
    font-size: 11px;
    color: #555;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .wordmark {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .wordmark span {
    font-size: 28px;
    font-weight: 500;
    letter-spacing: 2px;
  }

  .wordmark .os {
    font-weight: 400;
    color: #666;
  }

  /* Light versions */
  .light {
    background: #fafafa;
    border-color: #e5e5e5;
  }
  .light:hover { border-color: #ccc; }
  .light span { color: #0a0a0a; }
  .light .os { color: #999; }
  .light .label { color: #999; }

  .divider {
    width: 100%;
    max-width: 1200px;
    height: 1px;
    background: #1a1a1a;
  }

  .section-title {
    font-size: 12px;
    color: #444;
    letter-spacing: 3px;
  }
</style>
</head>
<body>

<h1>Kultura OS — Logo Concepts</h1>

<!-- ===== CONCEPT 1: K-trend ===== -->
<div class="concepts">

  <div class="concept">
    <span class="label">01 — K-Trend</span>
    <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Vertical bar -->
      <line x1="16" y1="8" x2="16" y2="56" stroke="#D97757" stroke-width="4" stroke-linecap="round"/>
      <!-- Upper ray — going up-right like a chart trend -->
      <line x1="16" y1="32" x2="48" y2="10" stroke="#D97757" stroke-width="4" stroke-linecap="round"/>
      <!-- Lower ray -->
      <line x1="16" y1="32" x2="48" y2="54" stroke="#D97757" stroke-width="4" stroke-linecap="round"/>
    </svg>
    <div class="wordmark">
      <span>kultura</span>
      <span class="os">os</span>
    </div>
  </div>

  <div class="concept">
    <span class="label">02 — K-Pulse</span>
    <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- K made of dots/dashes — pulse/data feel -->
      <line x1="14" y1="8" x2="14" y2="56" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="14" y1="32" x2="44" y2="10" stroke="#D97757" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="14" y1="32" x2="44" y2="54" stroke="#D97757" stroke-width="3.5" stroke-linecap="round"/>
      <!-- Pulse dot at tip -->
      <circle cx="48" cy="8" r="4" fill="#D97757"/>
    </svg>
    <div class="wordmark">
      <span>kultura</span>
      <span class="os">os</span>
    </div>
  </div>

  <div class="concept">
    <span class="label">03 — K-Minimal</span>
    <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Ultra-thin K -->
      <line x1="16" y1="10" x2="16" y2="54" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      <line x1="16" y1="32" x2="46" y2="10" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      <line x1="16" y1="32" x2="46" y2="54" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <div class="wordmark">
      <span>kultura</span>
      <span class="os">os</span>
    </div>
  </div>

  <div class="concept">
    <span class="label">04 — K-Block</span>
    <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Rounded rect background -->
      <rect x="2" y="2" width="60" height="60" rx="14" fill="#D97757"/>
      <!-- White K -->
      <line x1="20" y1="14" x2="20" y2="50" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
      <line x1="20" y1="32" x2="44" y2="14" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
      <line x1="20" y1="32" x2="44" y2="50" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    </svg>
    <div class="wordmark">
      <span>kultura</span>
      <span class="os">os</span>
    </div>
  </div>

  <div class="concept">
    <span class="label">05 — K-Chart</span>
    <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Vertical bar of K -->
      <line x1="14" y1="8" x2="14" y2="56" stroke="#D97757" stroke-width="3.5" stroke-linecap="round"/>
      <!-- Upper arm is a chart line going up -->
      <polyline points="14,34 26,28 36,18 50,8" stroke="#D97757" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <!-- Lower arm straight -->
      <line x1="14" y1="34" x2="50" y2="56" stroke="#D97757" stroke-width="3.5" stroke-linecap="round"/>
      <!-- Data points on chart arm -->
      <circle cx="26" cy="28" r="2.5" fill="#D97757"/>
      <circle cx="36" cy="18" r="2.5" fill="#D97757"/>
      <circle cx="50" cy="8" r="2.5" fill="#D97757"/>
    </svg>
    <div class="wordmark">
      <span>kultura</span>
      <span class="os">os</span>
    </div>
  </div>

  <div class="concept">
    <span class="label">06 — K-Dot</span>
    <svg width="180" height="40" viewBox="0 0 180 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Just the wordmark with a dot accent -->
      <text x="0" y="30" font-family="'IBM Plex Mono', monospace" font-size="32" font-weight="600" fill="#fff">K</text>
      <circle cx="26" cy="28" r="4" fill="#D97757"/>
    </svg>
    <div class="wordmark">
      <span style="font-size: 36px; font-weight: 600;">K<span style="color: #D97757;">.</span></span>
      <span style="font-weight: 400; color: #555;">kultura os</span>
    </div>
  </div>

</div>

<div class="divider"></div>
<span class="section-title">Light Mode</span>

<div class="concepts">

  <div class="concept light">
    <span class="label">01 — K-Trend</span>
    <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
      <line x1="16" y1="8" x2="16" y2="56" stroke="#D97757" stroke-width="4" stroke-linecap="round"/>
      <line x1="16" y1="32" x2="48" y2="10" stroke="#D97757" stroke-width="4" stroke-linecap="round"/>
      <line x1="16" y1="32" x2="48" y2="54" stroke="#D97757" stroke-width="4" stroke-linecap="round"/>
    </svg>
    <div class="wordmark">
      <span>kultura</span>
      <span class="os">os</span>
    </div>
  </div>

  <div class="concept light">
    <span class="label">04 — K-Block</span>
    <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
      <rect x="2" y="2" width="60" height="60" rx="14" fill="#D97757"/>
      <line x1="20" y1="14" x2="20" y2="50" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
      <line x1="20" y1="32" x2="44" y2="14" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
      <line x1="20" y1="32" x2="44" y2="50" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    </svg>
    <div class="wordmark">
      <span>kultura</span>
      <span class="os">os</span>
    </div>
  </div>

  <div class="concept light">
    <span class="label">05 — K-Chart</span>
    <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
      <line x1="14" y1="8" x2="14" y2="56" stroke="#D97757" stroke-width="3.5" stroke-linecap="round"/>
      <polyline points="14,34 26,28 36,18 50,8" stroke="#D97757" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <line x1="14" y1="34" x2="50" y2="56" stroke="#D97757" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="26" cy="28" r="2.5" fill="#D97757"/>
      <circle cx="36" cy="18" r="2.5" fill="#D97757"/>
      <circle cx="50" cy="8" r="2.5" fill="#D97757"/>
    </svg>
    <div class="wordmark">
      <span>kultura</span>
      <span class="os">os</span>
    </div>
  </div>

  <div class="concept light">
    <span class="label">06 — K-Dot</span>
    <div class="wordmark">
      <span style="font-size: 36px; font-weight: 600; color: #0a0a0a;">K<span style="color: #D97757;">.</span></span>
      <span style="font-weight: 400; color: #999;">kultura os</span>
    </div>
  </div>

</div>

</body>
</html>
