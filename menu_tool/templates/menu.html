<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Beer Menu Card Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #2a2824; color: #e5e1d6; font-family: 'Inter', system-ui, sans-serif; }

/* Layout */
.app { display: flex; height: 100vh; }
.sidebar { width: 460px; min-width: 460px; background: #1f1d1a; overflow-y: auto; border-right: 1px solid #3a3631; }
.preview-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; overflow-y: auto; padding: 32px; }

.card-wrap { transform-origin: top center; }

/* Form */
.form-section { padding: 18px 20px; border-bottom: 1px solid #2c2925; }
.form-section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: #9c9588; margin-bottom: 12px; font-weight: 600; }

.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 11px; color: #9c9588; margin-bottom: 4px; letter-spacing: 0.04em; }
.form-group input, .form-group select {
    width: 100%; padding: 8px 10px; background: #14130f; border: 1px solid #3a3631;
    color: #e5e1d6; font-size: 14px; font-family: inherit; border-radius: 4px;
}
.form-group input:focus { outline: none; border-color: #8a7e62; }

.row { display: flex; gap: 8px; }
.row > .form-group { flex: 1; }

/* Variant toggle */
.variant-toggle { display: flex; gap: 0; border: 1px solid #3a3631; border-radius: 4px; overflow: hidden; }
.variant-toggle button {
    flex: 1; padding: 10px 8px; background: #14130f; color: #9c9588;
    border: none; cursor: pointer; font-family: inherit; font-size: 12px; letter-spacing: 0.06em;
}
.variant-toggle button.active { background: #e5cba3; color: #1a1a1a; font-weight: 600; }

/* Rating sliders */
.rating-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.rating-row .lbl { width: 80px; font-size: 12px; color: #c2bbad; }
.rating-row .dots { display: flex; gap: 6px; }
.rating-row .dot {
    width: 18px; height: 18px; border-radius: 50%;
    border: 1px solid #6a6358; background: transparent; cursor: pointer;
    transition: background 0.08s;
}
.rating-row .dot.on { background: #e5cba3; border-color: #e5cba3; }
.rating-row .dot:hover { border-color: #e5cba3; }

/* Buttons */
.btn { padding: 9px 14px; border: none; cursor: pointer; font-size: 13px; font-family: inherit; border-radius: 4px; }
.btn-primary { background: #8a7e62; color: #fff; }
.btn-primary:hover { background: #756a52; }
.btn-secondary { background: #2c2925; color: #c2bbad; }
.btn-secondary:hover { background: #38342f; }
.btn-success { background: #5d7a4a; color: #fff; }
.btn-success:hover { background: #4d6740; }
.btn-danger { background: #7a4a4a; color: #fff; }
.btn-danger:hover { background: #663d3d; }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* Library link in toolbar */
.lib-link {
    display: inline-flex; align-items: center; gap: 6px;
    color: #c2bbad; text-decoration: none; font-size: 12px;
    padding: 6px 10px; background: #14130f; border: 1px solid #3a3631;
    border-radius: 4px;
}
.lib-link:hover { color: #e5cba3; border-color: #6a6358; }
.editing-meta { font-size: 11px; color: #6a6358; margin-top: 4px; }
.editing-meta b { color: #c2bbad; }

/* ===========================================================
   CARD CSS — mirrors templates/menu_card.html so the editor
   preview renders identically to the export. Keep both in sync
   if you change the design contract.
   =========================================================== */
.card {
    --paper: #e5cba3;
    --ink:   #1a1a1a;
    --mute:  #8a8580;
    --rule:  0.6pt;
    --mx: 16mm;
    --my: 16mm;
}
.card .page{
    width: 210mm; height: 297mm;
    background: var(--paper);
    padding: var(--my) var(--mx);
    position: relative; overflow: hidden;
    color: var(--ink);
    display: flex; flex-direction: column;
    font-family: "PT Serif", Georgia, serif;
    font-variant-numeric: tabular-nums lining-nums;
    -webkit-font-smoothing: antialiased;
}
.card .corner{
    position:absolute; width: 11mm; height: 11mm;
    border: var(--rule) solid var(--ink); z-index: 2;
}
.card .corner.tl{ top:7mm; left:7mm;     border-right:none; border-bottom:none; }
.card .corner.tr{ top:7mm; right:7mm;    border-left:none;  border-bottom:none; }
.card .corner.bl{ bottom:7mm; left:7mm;  border-right:none; border-top:none; }
.card .corner.br{ bottom:7mm; right:7mm; border-left:none;  border-top:none; }

.card .eyebrow{
    display:flex; justify-content: flex-end; align-items: baseline;
    line-height:1; padding-bottom: 6mm;
    border-bottom: var(--rule) solid var(--ink);
}
.card .eyebrow .num{ font-weight: 700; font-size: 36pt; letter-spacing: -0.01em; line-height: 1; }

.card .hero{ padding-top: 12mm; padding-bottom: 12mm; border-bottom: var(--rule) solid var(--ink); }
.card .trans{
    margin-bottom: 7mm; font-weight: 400; font-size: 20pt;
    letter-spacing: 0.10em; text-transform: uppercase; line-height: 1;
}
.card .name{
    font-weight: 700; font-size: 72pt; line-height: 1.05;
    letter-spacing: 0.02em; text-transform: uppercase; margin: 0;
}
.card .name.len-md { font-size: 50pt; }
.card .name.len-lg { font-size: 46pt; }
.card .name.len-xl { font-size: 38pt; }
.card .origin{
    margin-top: 9mm; font-weight: 400; font-size: 20pt;
    letter-spacing: 0.10em; text-transform: uppercase; line-height: 1;
}
.card .origin .accent{ font-weight: 700; font-size: 24pt; letter-spacing: 0.04em; }

/* facts & tags share one fixed block height so the 3 dividers are evenly spaced */
.card .facts{
    height: 30mm;
    border-bottom: var(--rule) solid var(--ink);
    display: flex; align-items: center; justify-content: space-between;
    gap: 8mm; line-height: 1;
}
.card .facts .style{ font-weight: 700; font-size: 43pt; letter-spacing: -0.005em; white-space: nowrap; }
.card .facts .abv  { font-weight: 700; font-size: 51pt; letter-spacing: -0.005em; white-space: nowrap; }
.card .facts .abv .pct{ font-weight: 400; font-size: 39pt; margin-left: 1mm; }

/* TAGS — single line, never wraps; fitTags() auto-shrinks to inner width. */
.card .tags{
    height: 30mm;
    border-bottom: var(--rule) solid var(--ink);
    display: flex; align-items: center;
    font-weight: 700; font-size: 26pt; line-height: 1.1;
    white-space: nowrap; overflow: hidden;
}
.card .tags .dot{ color: var(--mute); margin: 0 3mm; }

/* METERS — vertical stack; label left (44mm), 5 bars right-aligned. */
.card .meters{
    padding-top: 10mm; padding-bottom: 0;
    display: flex; flex-direction: column; gap: 7mm;
}
.card .meter{
    display: grid; grid-template-columns: 44mm 1fr;
    align-items: center; column-gap: 8mm; min-width: 0;
}
.card .meter .k{ font-weight: 700; font-size: 26pt; line-height: 1; white-space: nowrap; }
.card .meter .scale{
    display:flex; gap: 3mm; align-items: center; justify-content: flex-end;
    height: 10mm;
}
.card .meter .scale .d{
    width: 16mm; height: 8mm;
    border: var(--rule) solid var(--ink); background: transparent; flex: 0 0 auto;
}
.card .meter .scale .d.on{ background: var(--ink); }

.card .prices{
    margin-top: auto; padding-top: 8mm;
    border-top: var(--rule) solid var(--ink);
    display: grid; position: relative;
}
.card .prices::before, .card .prices::after{
    content:""; position:absolute; top: 8mm; bottom: 0;
    border-left: var(--rule) solid var(--ink);
}
.card .prices.v2{ grid-template-columns: 1fr 1fr; }
.card .prices.v2::before{ left: 50%; }
.card .prices.v2::after{ display: none; }
.card .prices.v2 .price{
    display:flex; flex-direction: row; align-items: baseline;
    gap: 6mm; padding: 0 8mm;
}
.card .prices.v2 .price.right{ justify-content: flex-end; }
.card .prices.v2 .price .vol{ font-weight: 400; font-size: 44pt; letter-spacing: -0.01em; line-height: 0.95; }
.card .prices.v2 .price .num{ font-weight: 700; font-size: 80pt; line-height: 0.95; letter-spacing: -0.03em; }

.card .prices.v3{ grid-template-columns: 1fr 1fr 1fr; }
.card .prices.v3::before{ left: 33.3333%; }
.card .prices.v3::after { left: 66.6666%; }
.card .prices.v3 .price{
    display:flex; flex-direction: row; align-items: baseline; justify-content: center;
    gap: 4mm; padding: 0 3mm;
}
.card .prices.v3 .price .vol{ font-weight: 400; font-size: 26pt; letter-spacing: -0.01em; line-height: 0.95; }
.card .prices.v3 .price .num{ font-weight: 700; font-size: 56pt; line-height: 0.95; letter-spacing: -0.03em; }
</style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <!-- Variant toggle -->
        <div class="form-section">
            <h3>Вариант разлива</h3>
            <div class="variant-toggle" id="variant-toggle">
                <button data-variant="v2" onclick="setVariant('v2')">A · 2 объёма (0,3 / 0,5)</button>
                <button data-variant="v3" onclick="setVariant('v3')">B · 3 объёма (0,25 / 0,4 / 0,5)</button>
            </div>
        </div>

        <!-- Library link + new -->
        <div class="form-section">
            <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                <a class="lib-link" href="/menu/library">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    Все позиции
                </a>
                <button class="btn btn-primary btn-sm" onclick="newItem()">+ Новая</button>
                <div style="flex: 1"></div>
            </div>
            <div class="editing-meta" id="editing-meta"></div>
        </div>

        <!-- Edit form -->
        <div class="form-section">
            <h3>Редактирование</h3>

            <div class="row">
                <div class="form-group" style="flex: 0 0 90px;">
                    <label>№</label>
                    <input id="f-n" type="number" min="1" oninput="updatePreview()"/>
                </div>
                <div class="form-group">
                    <label>Название (RU, в шапке КАПС)</label>
                    <input id="f-name" oninput="updatePreview()"/>
                </div>
            </div>

            <div class="form-group">
                <label>Латинское / оригинальное название</label>
                <input id="f-latin" placeholder="Riegele Commerzienrat" oninput="updatePreview()"/>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Страна</label>
                    <input id="f-country" placeholder="Германия" oninput="updatePreview()"/>
                </div>
                <div class="form-group">
                    <label>Пивоварня</label>
                    <input id="f-brewery" placeholder="Riegele" oninput="updatePreview()"/>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Стиль</label>
                    <input id="f-style" placeholder="Немецкий лагер" oninput="updatePreview()"/>
                </div>
                <div class="form-group" style="flex: 0 0 110px;">
                    <label>ABV (4,6)</label>
                    <input id="f-abv" placeholder="5,2" oninput="updatePreview()"/>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3>Дескрипторы (до 3)</h3>
            <div class="row">
                <div class="form-group"><input id="f-tag1" placeholder="солодовый" oninput="updatePreview()"/></div>
                <div class="form-group"><input id="f-tag2" placeholder="медовый" oninput="updatePreview()"/></div>
                <div class="form-group"><input id="f-tag3" placeholder="благородный" oninput="updatePreview()"/></div>
            </div>
        </div>

        <div class="form-section">
            <h3>Рейтинги (1–5)</h3>
            <div class="rating-row">
                <span class="lbl">горечь</span>
                <div class="dots" data-key="gor"></div>
            </div>
            <div class="rating-row">
                <span class="lbl">плотность</span>
                <div class="dots" data-key="plot"></div>
            </div>
            <div class="rating-row">
                <span class="lbl">цвет</span>
                <div class="dots" data-key="cvet"></div>
            </div>
        </div>

        <div class="form-section">
            <h3>Цены (без знака валюты)</h3>
            <div class="row">
                <div class="form-group">
                    <label>0,25 л (вариант B)</label>
                    <input id="f-p025" type="number" min="0" step="1" oninput="updatePreview()"/>
                </div>
                <div class="form-group">
                    <label>0,3 л (вариант A)</label>
                    <input id="f-p03" type="number" min="0" step="1" oninput="updatePreview()"/>
                </div>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>0,4 л (вариант B)</label>
                    <input id="f-p04" type="number" min="0" step="1" oninput="updatePreview()"/>
                </div>
                <div class="form-group">
                    <label>0,5 л (оба)</label>
                    <input id="f-p05" type="number" min="0" step="1" oninput="updatePreview()"/>
                </div>
            </div>
        </div>

        <div class="form-section" style="display: flex; gap: 8px; flex-wrap: wrap;">
            <button class="btn btn-primary" onclick="saveItem()" style="flex:1;">Сохранить</button>
            <button class="btn btn-success" onclick="exportPdf()" style="flex:1;" title="A4 PDF — для печати, вектор">PDF (A4)</button>
            <button class="btn btn-secondary" onclick="exportPng()" style="flex:1;" title="PNG 1588×2246 — для соцсетей, растр">PNG</button>
            <button class="btn btn-danger" onclick="deleteItem()" id="btn-delete" style="display:none;">Удалить</button>
        </div>
    </div>

    <!-- Preview -->
    <div class="preview-area" id="preview-area">
        <div class="card-wrap card" id="card-wrap">
            <article class="page" id="menu-card"></article>
        </div>
    </div>
</div>

<script>
const VARIANT_LABELS = { v2: "Variant A · 2 volumes", v3: "Variant B · 3 volumes" };

let items = [];
let editingId = null;
let variant = "v3";
let ratings = { gor: 0, plot: 0, cvet: 0 };

function urlId() {
    const p = new URLSearchParams(window.location.search);
    const n = parseInt(p.get("id"), 10);
    return Number.isFinite(n) ? n : null;
}
function setUrlId(id) {
    const u = new URL(window.location.href);
    if (id) u.searchParams.set("id", id);
    else u.searchParams.delete("id");
    window.history.replaceState({}, "", u.toString());
}

// ---- Helpers ----
const $ = (id) => document.getElementById(id);
const esc = (s) => (s == null ? "" : String(s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"));
const fmtNum = (v) => {
    if (v === null || v === undefined || v === "") return "—";
    return String(v).replace(".", ",");
};
const pad2 = (n) => String(n).padStart(2, "0");
const nameClass = (name) => {
    const l = (name || "").length;
    if (l > 22) return "len-xl";
    if (l > 16) return "len-lg";
    if (l > 11) return "len-md";
    return "";
};

// ---- Init ----
async function init() {
    const sRes = await fetch("/menu/api/settings");
    const s = await sRes.json();
    variant = s.variant || "v3";
    renderVariantToggle();

    const res = await fetch("/menu/api/items");
    items = await res.json();
    renderRatingDots();

    const wanted = urlId();
    const target = wanted ? items.find((i) => i.id === wanted) : null;
    if (target) selectItem(target.id);
    else newItem();
}

// ---- Variant ----
function renderVariantToggle() {
    document.querySelectorAll("#variant-toggle button").forEach((b) => {
        b.classList.toggle("active", b.dataset.variant === variant);
    });
}
async function setVariant(v) {
    if (v !== "v2" && v !== "v3") return;
    variant = v;
    renderVariantToggle();
    updatePreview();
    await fetch("/menu/api/settings", {
        method: "PUT", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ variant }),
    });
}

// ---- Ratings ----
function renderRatingDots() {
    document.querySelectorAll(".rating-row .dots").forEach((box) => {
        const key = box.dataset.key;
        const val = ratings[key] || 0;
        box.innerHTML = "";
        for (let i = 1; i <= 5; i++) {
            const d = document.createElement("span");
            d.className = "dot" + (i <= val ? " on" : "");
            d.onclick = () => {
                ratings[key] = (ratings[key] === i) ? i - 1 : i;
                renderRatingDots();
                updatePreview();
            };
            box.appendChild(d);
        }
    });
}

// ---- Editing meta (which item is loaded) ----
function renderEditingMeta() {
    const el = $("editing-meta");
    if (editingId) {
        const it = items.find((i) => i.id === editingId);
        const label = it ? (it.name || `№ ${pad2(it.n || 0)}`) : `#${editingId}`;
        el.innerHTML = `Редактирование: <b>${esc(label)}</b>`;
    } else {
        el.innerHTML = "Новая позиция (не сохранена)";
    }
}

function newItem() {
    editingId = null;
    const usedN = new Set(items.map((i) => i.n || 0));
    let nextN = 1;
    while (usedN.has(nextN)) nextN++;
    $("f-n").value = nextN;
    ["f-name","f-latin","f-country","f-brewery","f-style","f-abv","f-tag1","f-tag2","f-tag3","f-p025","f-p03","f-p04","f-p05"]
        .forEach((id) => { $(id).value = ""; });
    ratings = { gor: 0, plot: 0, cvet: 0 };
    renderRatingDots();
    updatePreview();
    $("btn-delete").style.display = "none";
    setUrlId(null);
    renderEditingMeta();
}

function selectItem(id) {
    const item = items.find((i) => i.id === id);
    if (!item) return;
    editingId = id;
    $("f-n").value = item.n || "";
    $("f-name").value = item.name || "";
    $("f-latin").value = item.latin || "";
    $("f-country").value = item.country || "";
    $("f-brewery").value = item.brewery || "";
    $("f-style").value = item.style || "";
    $("f-abv").value = item.abv || "";
    const tags = Array.isArray(item.tags) ? item.tags : [];
    $("f-tag1").value = tags[0] || "";
    $("f-tag2").value = tags[1] || "";
    $("f-tag3").value = tags[2] || "";
    $("f-p025").value = item.p025 ?? "";
    $("f-p03").value  = item.p03  ?? "";
    $("f-p04").value  = item.p04  ?? "";
    $("f-p05").value  = item.p05  ?? "";
    const r = item.ratings || {};
    ratings = {
        gor:  Math.max(0, Math.min(5, parseInt(r.gor, 10)  || 0)),
        plot: Math.max(0, Math.min(5, parseInt(r.plot, 10) || 0)),
        cvet: Math.max(0, Math.min(5, parseInt(r.cvet, 10) || 0)),
    };
    renderRatingDots();
    updatePreview();
    $("btn-delete").style.display = "inline-block";
    setUrlId(id);
    renderEditingMeta();
}

function getFormItem() {
    const num = (id) => {
        const v = $(id).value.trim();
        return v === "" ? null : Number(v);
    };
    const tags = ["f-tag1","f-tag2","f-tag3"].map((id) => $(id).value.trim()).filter((s) => s);
    return {
        n: parseInt($("f-n").value, 10) || 0,
        name:    $("f-name").value.trim(),
        latin:   $("f-latin").value.trim(),
        country: $("f-country").value.trim(),
        brewery: $("f-brewery").value.trim(),
        style:   $("f-style").value.trim(),
        abv:     $("f-abv").value.trim(),
        tags,
        ratings: { ...ratings },
        p025: num("f-p025"),
        p03:  num("f-p03"),
        p04:  num("f-p04"),
        p05:  num("f-p05"),
    };
}

// ---- Save / Delete ----
async function saveItem() {
    const item = getFormItem();
    if (editingId) {
        await fetch(`/menu/api/items/${editingId}`, {
            method: "PUT", headers: { "Content-Type": "application/json" },
            body: JSON.stringify(item),
        });
    } else {
        const res = await fetch("/menu/api/items", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify(item),
        });
        const created = await res.json();
        editingId = created.id;
        setUrlId(editingId);
    }
    const r = await fetch("/menu/api/items");
    items = await r.json();
    $("btn-delete").style.display = "inline-block";
    renderEditingMeta();
}

async function deleteItem() {
    if (!editingId) return;
    if (!confirm("Удалить позицию?")) return;
    await fetch(`/menu/api/items/${editingId}`, { method: "DELETE" });
    window.location.href = "/menu/library";
}

// ---- Preview ----
function updatePreview() {
    const it = getFormItem();
    const card = $("menu-card");

    const trans = it.latin ? `<div class="trans">[ ${esc(it.latin)} ]</div>` : "";
    const originParts = [];
    if (it.country) originParts.push(`<span class="accent">${esc(it.country)}</span>`);
    if (it.brewery) originParts.push(esc(it.brewery));
    const origin = originParts.length
        ? `<div class="origin">${originParts.join(" · ")}</div>`
        : `<div class="origin"></div>`;

    const tagsHtml = it.tags
        .map((t, i) => `${i ? '<span class="dot">·</span>' : ""}<span>${esc(t)}</span>`)
        .join("");

    const dots = (n) => {
        let h = "";
        for (let i = 1; i <= 5; i++) h += `<span class="d${i <= n ? " on" : ""}"></span>`;
        return h;
    };

    const pricesHtml = variant === "v2"
        ? `<section class="prices v2">
            <div class="price">
                <span class="vol">0,3</span><span class="num">${fmtNum(it.p03)}</span>
            </div>
            <div class="price right">
                <span class="vol">0,5</span><span class="num">${fmtNum(it.p05)}</span>
            </div>
           </section>`
        : `<section class="prices v3">
            <div class="price"><span class="vol">0,25</span><span class="num">${fmtNum(it.p025)}</span></div>
            <div class="price"><span class="vol">0,4</span><span class="num">${fmtNum(it.p04)}</span></div>
            <div class="price"><span class="vol">0,5</span><span class="num">${fmtNum(it.p05)}</span></div>
           </section>`;

    card.innerHTML = `
        <span class="corner tl"></span><span class="corner tr"></span>
        <span class="corner bl"></span><span class="corner br"></span>

        <header class="eyebrow"><span class="num">№ ${pad2(it.n || 0)}</span></header>

        <section class="hero">
            ${trans}
            <h1 class="name ${nameClass(it.name)}">${esc(it.name)}</h1>
            ${origin}
        </section>

        <section class="facts">
            <span class="style">${esc(it.style)}</span>
            <span class="abv">${esc(it.abv)}<span class="pct">%</span></span>
        </section>

        <section class="tags">${tagsHtml}</section>

        <section class="meters">
            <div class="meter"><span class="k">горечь</span><div class="scale">${dots(it.ratings.gor)}</div></div>
            <div class="meter"><span class="k">плотность</span><div class="scale">${dots(it.ratings.plot)}</div></div>
            <div class="meter"><span class="k">цвет</span><div class="scale">${dots(it.ratings.cvet)}</div></div>
        </section>

        ${pricesHtml}
    `;

    fitTags();
    fitPreview();
}

function fitTags() {
    document.querySelectorAll("#menu-card .tags").forEach((el) => {
        el.style.fontSize = "";
        let size = parseFloat(getComputedStyle(el).fontSize);
        const min = 14;
        while (el.scrollWidth > el.clientWidth + 1 && size > min) {
            size -= 1;
            el.style.fontSize = size + "px";
        }
    });
}

function fitPreview() {
    const wrap = $("card-wrap");
    const area = $("preview-area");
    wrap.style.transform = "";
    const naturalW = $("menu-card").offsetWidth;     // 210mm ≈ 794 px
    const availW = area.clientWidth - 64;
    const availH = area.clientHeight - 64;
    const naturalH = $("menu-card").offsetHeight;    // 297mm ≈ 1123 px
    const s = Math.min(availW / naturalW, availH / naturalH, 1);
    wrap.style.transform = `scale(${s})`;
    wrap.style.width = `${naturalW}px`;
    wrap.style.height = `${naturalH}px`;
}
window.addEventListener("resize", fitPreview);

// ---- Export ----
async function exportPng() {
    return exportFile("/menu/api/render", "png");
}
async function exportPdf() {
    return exportFile("/menu/api/render-pdf", "pdf");
}
async function exportFile(endpoint, ext) {
    const item = getFormItem();
    const res = await fetch(endpoint, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ...item, variant }),
    });
    if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        alert("Render error: " + (err.error || res.statusText));
        return;
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `menu-${pad2(item.n || 0)}-${item.name || "card"}-${variant}.${ext}`;
    a.click();
    URL.revokeObjectURL(url);
}

init();
</script>
